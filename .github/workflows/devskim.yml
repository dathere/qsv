# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: DevSkim

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '41 12 * * 2'
  workflow_dispatch:

jobs:
  lint:
    name: DevSkim
    runs-on: ubuntu-22.04
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run DevSkim scanner
        uses: microsoft/DevSkim-Action@v1
        with:
          # .claude/** : plugin / agent scratch space (not shipped)
          # src/cmd/profile/py/jinja2_helpers.py : vendored byte-for-byte
          #   from dathere/datapusher-plus; keep upstream-identical so
          #   re-vendoring stays trivial. Other qsv-owned profile Python
          #   (profile_engine.py, qsv_ckan_stubs.py) STAYS in scan.
          # tests/resources/** : test fixture data (also includes vendored
          #   YAML / CSV samples); scanning these is noise
          ignore-globs: |
            .claude/**
            src/cmd/profile/py/jinja2_helpers.py
            tests/resources/**
        
      - name: Upload DevSkim scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: devskim-results.sarif
