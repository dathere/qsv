name: Publish Apple Silicon - Nightly

on:
  workflow_dispatch:

env:
  QSV_KIND: prebuilt-nightly

jobs:
  analyze-tags:
    runs-on: ubuntu-latest
    outputs:
      previous-tag: ${{ steps.previoustag.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      #▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼#
      - name: Get previous tag
        id: previoustag
        uses: "WyriHaximus/github-action-get-previous-tag@v2"
      #▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲#

  publish:
    name: Publish for ${{ matrix.job.target }}
    needs: analyze-tags
    # runs-on: self-hosted
    runs-on: macos-latest
    strategy:
      matrix:
        rust: [nightly-2026-04-01]
        job:
          - os: macos
            os-name: macos
            target: aarch64-apple-darwin
            architecture: aarch64
            use-cross: false
            addl-build-args: --features=apply,fetch,foreach,self_update,luau,to,geocode,lens
            default-features: --no-default-features
            addl-qsvlite-features:
            addl-qsvdp-features:
            addl-rustflags:

    steps:
    - name: Installing Rust toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.rust }}
        components: rust-src
        target: ${{ matrix.job.target }}
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        submodules: recursive
        ref: ${{ needs.analyze-tags.outputs.previous-tag }}
    - name: Build qsv
      env:
        RUSTFLAGS: --emit=asm ${{ matrix.job.addl-rustflags }}
      # actions-rs/cargo is archived/Node20-deprecated (qsv #4002); invoke cargo directly.
      # `+${{ matrix.rust }}` pins the toolchain vs a stale per-directory rustup override on self-hosted runners.
      shell: bash
      run: cargo +${{ matrix.rust }} build --profile ${{ contains(matrix.job.addl-build-args, 'luau') && 'release-luau' || 'release' }} --locked --bin qsv -Z build-std=std --target ${{ matrix.job.target }} ${{ matrix.job.addl-build-args }},feature_capable,nightly ${{ matrix.job.default-features }}
    - name: Build qsvlite
      env:
        RUSTFLAGS: --emit=asm ${{ matrix.job.addl-rustflags }}
      # actions-rs/cargo is archived/Node20-deprecated (qsv #4002); invoke cargo directly.
      # `+${{ matrix.rust }}` pins the toolchain vs a stale per-directory rustup override on self-hosted runners.
      shell: bash
      run: cargo +${{ matrix.rust }} build --release --locked --bin qsvlite -Z build-std=std --features=lite,self_update,nightly,${{ matrix.job.addl-qsvlite-features }} --target ${{ matrix.job.target }} ${{ matrix.job.default-features }}
    - name: Copy binaries to working dir
      # TODO: Add qsvdp-nightly build back in after v5.0.3, be sure to copy qsvdp binaries below
      shell: bash
      run: |
        mkdir qsv-${{ needs.analyze-tags.outputs.previous-tag }}
        # qsv uses release-luau (panic=unwind, qsv #3937) when built with luau, else release; the other bins use release
        for d in release-luau release; do
          rm -f target/${{ matrix.job.target }}/$d/*.d 2>/dev/null || true
          cp -v target/${{ matrix.job.target }}/$d/qsv* qsv-${{ needs.analyze-tags.outputs.previous-tag }} 2>/dev/null || true
        done
        cd qsv-${{ needs.analyze-tags.outputs.previous-tag }}
        mv qsv qsv_nightly
        mv qsvlite qsvlite_nightly
        rustup show > qsv_nightly_rust_version_info.txt
        cd ..
    - name: Create README
      shell: bash
      run: |
        cat docs/publishing_assets/README.txt docs/publishing_assets/qsv-${{ matrix.job.target }}.txt > qsv-${{ needs.analyze-tags.outputs.previous-tag }}/README
    - name: install zipsign
      run: |
        cargo install zipsign
    - name: Fetch zipsign private key
      # replaces mobiledevops/secret-to-file-action (Node20-deprecated, qsv #4002):
      # decode the base64 secret to qsvpriv.key. bash shell + `base64 -d` work on all
      # runners (incl. Windows git-bash, macOS/BSD). Secret passed via env, not inlined.
      shell: bash
      env:
        ZIPSIGN_KEY: ${{ secrets.QSV_ZIPSIGN_PRIV_KEY }}
      run: printf '%s' "$ZIPSIGN_KEY" | base64 -d > qsvpriv.key
    - name: Download latest release zip
      uses: robinraju/release-downloader@v1.13
      with:
        repository: "dathere/qsv"
        latest: true
        preRelease: true
        token: ${{ secrets.GITHUB_TOKEN }}
        fileName: qsv-${{ needs.analyze-tags.outputs.previous-tag }}-${{ matrix.job.target }}.zip
    - name: remove zipsign signature from zip archive
      run: |
        zipsign unsign zip qsv-${{ needs.analyze-tags.outputs.previous-tag }}-${{ matrix.job.target }}.zip
    - name: install 7zip
      run: brew install sevenzip
    - name: add/update nightly files to zip
      run: 7zz u -tzip qsv-${{ needs.analyze-tags.outputs.previous-tag }}-${{ matrix.job.target }}.zip ./qsv-${{ needs.analyze-tags.outputs.previous-tag }}/* -mx=9 -mmt=on
    - name: re-zipsign zip archive
      run: |
        zipsign sign zip qsv-${{ needs.analyze-tags.outputs.previous-tag }}-${{ matrix.job.target }}.zip qsvpriv.key
        cp -v qsv-${{ needs.analyze-tags.outputs.previous-tag }}-${{ matrix.job.target }}.zip /tmp
    - name: Upload zipped binaries to release
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: qsv-${{ needs.analyze-tags.outputs.previous-tag }}-${{ matrix.job.target }}.zip
        asset_name: qsv-${{ needs.analyze-tags.outputs.previous-tag }}-${{ matrix.job.target }}.zip
        prerelease: true
        make_latest: false
        overwrite: true
        tag: ${{ needs.analyze-tags.outputs.previous-tag }}    
 
