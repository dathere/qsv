name: Publish qsvpy Apple Silicon

on:
  workflow_dispatch:

env:
  QSV_KIND: prebuilt

jobs:
  analyze-tags:
    runs-on: ubuntu-22.04
    outputs:
      previous-tag: ${{ steps.previoustag.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      #▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼#
      - name: Get previous tag
        id: previoustag
        uses: "WyriHaximus/github-action-get-previous-tag@v2"
      #▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲#

  publish:
    name: Publish for ${{ matrix.job.target }}
    needs: analyze-tags
    runs-on: self-hosted
    # runs-on: macos-latest
    strategy:
      matrix:
        rust: [stable]
        job:
          - os: macos
            os-name: macos
            target: aarch64-apple-darwin
            architecture: aarch64
            addl-build-args: --features=apply,fetch,foreach,self_update,luau,polars,to,geocode,python,lens,magika,color
            default-features:
            addl-qsvlite-features:
            addl-qsvdp-features:

    steps:
    - name: Installing Rust toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.rust }}
        target: ${{ matrix.job.target }}
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        submodules: recursive
        ref: ${{ needs.analyze-tags.outputs.previous-tag }}

    - uses: actions/setup-python@v6.2.0
      with:
            python-version: '3.11'
    - name: Build qsvpy311
      env:
        RUSTFLAGS: --emit=asm -C target-cpu=native
      # actions-rs/cargo is archived/Node20-deprecated (qsv #4002); invoke cargo directly.
      # `+${{ matrix.rust }}` pins the toolchain vs a stale per-directory rustup override on self-hosted runners.
      shell: bash
      run: cargo +${{ matrix.rust }} build --profile ${{ contains(matrix.job.addl-build-args, 'luau') && 'release-luau' || 'release' }} --locked --bin qsv --target ${{ matrix.job.target }} ${{ matrix.job.addl-build-args }},feature_capable ${{ matrix.job.default-features }}
    - name: Copy binaries to working dir
      shell: bash
      run: |
            mkdir qsv-${{ needs.analyze-tags.outputs.previous-tag }}
            # qsv uses release-luau (panic=unwind, qsv #3937) when built with luau, else release; the other bins use release
            for d in release-luau release; do
              rm -f target/${{ matrix.job.target }}/$d/*.d 2>/dev/null || true
              cp target/${{ matrix.job.target }}/$d/qsv* qsv-${{ needs.analyze-tags.outputs.previous-tag }} 2>/dev/null || true
            done
            cd qsv-${{ needs.analyze-tags.outputs.previous-tag }}
            mv qsv qsvpy311
            cd ..

    - uses: actions/setup-python@v6.2.0
      with:
            python-version: '3.12'
    - name: Build qsvpy312
      env:
        RUSTFLAGS: --emit=asm -C target-cpu=native
      # actions-rs/cargo is archived/Node20-deprecated (qsv #4002); invoke cargo directly.
      # `+${{ matrix.rust }}` pins the toolchain vs a stale per-directory rustup override on self-hosted runners.
      shell: bash
      run: cargo +${{ matrix.rust }} build --profile ${{ contains(matrix.job.addl-build-args, 'luau') && 'release-luau' || 'release' }} --locked --bin qsv --target ${{ matrix.job.target }} ${{ matrix.job.addl-build-args }},feature_capable ${{ matrix.job.default-features }}
    - name: Copy binaries to working dir
      shell: bash
      run: |
                # qsv uses release-luau (panic=unwind, qsv #3937) when built with luau, else release; the other bins use release
                for d in release-luau release; do
                  rm -f target/${{ matrix.job.target }}/$d/*.d 2>/dev/null || true
                  cp target/${{ matrix.job.target }}/$d/qsv* qsv-${{ needs.analyze-tags.outputs.previous-tag }} 2>/dev/null || true
                done
                cd qsv-${{ needs.analyze-tags.outputs.previous-tag }}
                mv qsv qsvpy312
                cd ..

    - uses: actions/setup-python@v6.2.0
      with:
            python-version: '3.13'
    - name: Build qsvpy313
      env:
        RUSTFLAGS: --emit=asm -C target-cpu=native
      # actions-rs/cargo is archived/Node20-deprecated (qsv #4002); invoke cargo directly.
      # `+${{ matrix.rust }}` pins the toolchain vs a stale per-directory rustup override on self-hosted runners.
      shell: bash
      run: cargo +${{ matrix.rust }} build --profile ${{ contains(matrix.job.addl-build-args, 'luau') && 'release-luau' || 'release' }} --locked --bin qsv --target ${{ matrix.job.target }} ${{ matrix.job.addl-build-args }},feature_capable ${{ matrix.job.default-features }}
    - name: Copy binaries to working dir
      shell: bash
      run: |
                # qsv uses release-luau (panic=unwind, qsv #3937) when built with luau, else release; the other bins use release
                for d in release-luau release; do
                  rm -f target/${{ matrix.job.target }}/$d/*.d 2>/dev/null || true
                  cp target/${{ matrix.job.target }}/$d/qsv* qsv-${{ needs.analyze-tags.outputs.previous-tag }} 2>/dev/null || true
                done
                cd qsv-${{ needs.analyze-tags.outputs.previous-tag }}
                mv qsv qsvpy313
                cd ..

    - name: install zipsign
      run: |
        cargo install zipsign
    - name: Fetch zipsign private key
      # replaces mobiledevops/secret-to-file-action (Node20-deprecated, qsv #4002):
      # decode the base64 secret to qsvpriv.key. bash shell + `base64 -d` work on all
      # runners (incl. Windows git-bash, macOS/BSD). Secret passed via env, not inlined.
      shell: bash
      env:
        ZIPSIGN_KEY: ${{ secrets.QSV_ZIPSIGN_PRIV_KEY }}
      run: printf '%s' "$ZIPSIGN_KEY" | base64 -d > qsvpriv.key
    - name: Download latest release zip
      uses: robinraju/release-downloader@v1.13
      with:
          repository: "dathere/qsv"
          latest: true
          preRelease: true
          token: ${{ secrets.GITHUB_TOKEN }}
          fileName: qsv-${{ needs.analyze-tags.outputs.previous-tag }}-${{ matrix.job.target }}.zip
    - name: remove zipsign signature from zip archive
      run: |
        zipsign unsign zip qsv-${{ needs.analyze-tags.outputs.previous-tag }}-${{ matrix.job.target }}.zip
    - name: install 7zip
      run: brew install sevenzip
    - name: add/update qsvpy files to zip
      run: 7zz u -tzip qsv-${{ needs.analyze-tags.outputs.previous-tag }}-${{ matrix.job.target }}.zip ./qsv-${{ needs.analyze-tags.outputs.previous-tag }}/qsv* -mx=9 -mmt=on
    - name: re-zipsign zip archive
      run: |
        zipsign sign zip qsv-${{ needs.analyze-tags.outputs.previous-tag }}-${{ matrix.job.target }}.zip qsvpriv.key
        cp qsv-${{ needs.analyze-tags.outputs.previous-tag }}-${{ matrix.job.target }}.zip /tmp
    - name: Upload zipped binaries to release
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: qsv-${{ needs.analyze-tags.outputs.previous-tag }}-${{ matrix.job.target }}.zip
        asset_name: qsv-${{ needs.analyze-tags.outputs.previous-tag }}-${{ matrix.job.target }}.zip
        prerelease: true
        make_latest: false
        overwrite: true
        tag: ${{ needs.analyze-tags.outputs.previous-tag }} 
 
