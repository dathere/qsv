name: Publish Apple Silicon

on:
  workflow_dispatch:

env:
  QSV_KIND: prebuilt

jobs:
  analyze-tags:
    runs-on: ubuntu-22.04
    outputs:
      previous-tag: ${{ steps.previoustag.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      #▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼#
      - name: Get previous tag
        id: previoustag
        uses: "WyriHaximus/github-action-get-previous-tag@v2"
      #▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲#

  publish:
    name: Publish for ${{ matrix.job.target }}
    needs: analyze-tags
    runs-on: self-hosted
    # runs-on: macos-latest
    strategy:
      matrix:
        rust: [stable]
        job:
          - os: macos
            os-name: macos
            target: aarch64-apple-darwin
            architecture: aarch64
            use-cross: false
            addl-build-args: --features=apply,fetch,foreach,self_update,luau,polars,to,geocode,lens,magika,color
            default-features:
            addl-qsvlite-features:
            addl-qsvdp-features:

    steps:
    - name: Installing Rust toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.rust }}
        target: ${{ matrix.job.target }}
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        submodules: recursive
        ref: ${{ needs.analyze-tags.outputs.previous-tag }}
    # ensure 7zip is present so PGO training can use the full NYC-311 dataset (the
    # later "install 7zip" step runs post-build; this is idempotent on the self-hosted runner)
    - name: install 7zip (for PGO training)
      run: brew install sevenzip
    # PGO-optimized qsv build (issue #1448). aarch64-apple-darwin is an ideal PGO target
    # (native, already target-cpu=native). build-pgo.sh runs instrument -> train -> optimize
    # and leaves the binary where the "Copy binaries" step looks. QSV_KIND=prebuilt-pgo.
    - name: Build qsv (PGO)
      shell: bash
      env:
        QSV_KIND: prebuilt-pgo
        # pin the toolchain for the bare `cargo pgo` invocations in build-pgo.sh;
        # RUSTUP_TOOLCHAIN beats any leftover per-directory `rustup override` on this
        # self-hosted runner (a stale, sub-MSRV nightly override broke the 21.1.0 build).
        RUSTUP_TOOLCHAIN: ${{ matrix.rust }}
        TARGET: ${{ matrix.job.target }}
        DEFAULT_FEATURES: ${{ matrix.job.default-features }}
        RUSTFLAGS: -C target-cpu=native
        ADDL_BUILD_ARGS: ${{ matrix.job.addl-build-args }}
      run: |
        # strip the leading "--features=" to get the bare comma-separated feature list
        export QSV_FEATURES="${ADDL_BUILD_ARGS#--features=}"
        chmod +x scripts/build-pgo.sh scripts/pgo-train.sh
        ./scripts/build-pgo.sh
    - name: Build qsvlite
      env:
        RUSTFLAGS: --emit=asm -C target-cpu=native
      # actions-rs/cargo is archived/Node20-deprecated (qsv #4002); invoke cargo directly.
      # `+${{ matrix.rust }}` pins the toolchain vs a stale per-directory rustup override on self-hosted runners.
      shell: bash
      run: cargo +${{ matrix.rust }} build --release --locked --bin qsvlite --features=lite,self_update,${{ matrix.job.addl-qsvlite-features }} --target ${{ matrix.job.target }} ${{ matrix.job.default-features }}
    # qsvdp (datapusher_plus) is a Linux deployment helper — not built/shipped for macOS.
    - name: Build qsvmcp
      env:
        RUSTFLAGS: --emit=asm -C target-cpu=native
      # actions-rs/cargo is archived/Node20-deprecated (qsv #4002); invoke cargo directly.
      # `+${{ matrix.rust }}` pins the toolchain vs a stale per-directory rustup override on self-hosted runners.
      shell: bash
      run: cargo +${{ matrix.rust }} build --release --locked --bin qsvmcp --features=qsvmcp --target ${{ matrix.job.target }} ${{ matrix.job.default-features }}
    - name: Copy binaries to working dir
      shell: bash
      run: |
        mkdir qsv-${{ needs.analyze-tags.outputs.previous-tag }}
        # qsv uses release-luau (panic=unwind, qsv #3937) when built with luau, else release; the other bins use release
        for d in release-luau release; do
          rm -f target/${{ matrix.job.target }}/$d/*.d 2>/dev/null || true
          cp -v target/${{ matrix.job.target }}/$d/qsv* qsv-${{ needs.analyze-tags.outputs.previous-tag }} 2>/dev/null || true
        done
    - name: Create README
      shell: bash
      run: |
        cat docs/publishing_assets/README.txt docs/publishing_assets/qsv-${{ matrix.job.target }}.txt > qsv-${{ needs.analyze-tags.outputs.previous-tag }}/README
    - name: install 7zip
      run: brew install sevenzip
    - name: zip up binaries
      run: 7zz a -tzip qsv-${{ needs.analyze-tags.outputs.previous-tag }}-${{ matrix.job.target }}.zip ./qsv-${{ needs.analyze-tags.outputs.previous-tag }}/* -mx=9 -mmt=on
    - name: install zipsign
      run: |
        cargo install zipsign
    - name: Fetch zipsign private key
      # replaces mobiledevops/secret-to-file-action (Node20-deprecated, qsv #4002):
      # decode the base64 secret to qsvpriv.key. bash shell + `base64 -d` work on all
      # runners (incl. Windows git-bash, macOS/BSD). Secret passed via env, not inlined.
      shell: bash
      env:
        ZIPSIGN_KEY: ${{ secrets.QSV_ZIPSIGN_PRIV_KEY }}
      run: printf '%s' "$ZIPSIGN_KEY" | base64 -d > qsvpriv.key
    - name: zipsign binary
      run: |
        zipsign sign zip qsv-${{ needs.analyze-tags.outputs.previous-tag }}-${{ matrix.job.target }}.zip qsvpriv.key
        cp -v qsv-${{ needs.analyze-tags.outputs.previous-tag }}-${{ matrix.job.target }}.zip /tmp
    - name: Upload zipped binaries to release
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: qsv-${{ needs.analyze-tags.outputs.previous-tag }}-${{ matrix.job.target }}.zip
        asset_name: qsv-${{ needs.analyze-tags.outputs.previous-tag }}-${{ matrix.job.target }}.zip
        overwrite: true
        tag: ${{ needs.analyze-tags.outputs.previous-tag }}    
 
