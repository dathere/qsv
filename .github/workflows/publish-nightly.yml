name: Publish Nightly

on:
  workflow_dispatch:

env:
  QSV_KIND: prebuilt-nightly

jobs:
  analyze-tags:
    runs-on: ubuntu-latest
    outputs:
      previous-tag: ${{ steps.previoustag.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      #▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼▼#
      - name: Get previous tag
        id: previoustag
        uses: "WyriHaximus/github-action-get-previous-tag@v2"
      #▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲#

  publish:
    name: Publish for ${{ matrix.job.target }}
    needs: analyze-tags
    runs-on: ${{ matrix.job.os }}
    strategy:
      matrix:
        rust: [nightly-2026-04-01]
        job:
          - os: ubuntu-24.04
            os-name: linux
            target: x86_64-unknown-linux-gnu
            architecture: x86_64
            addl-build-args: --features=apply,luau,fetch,foreach,nightly,self_update,geocode,polars,to,lens,prompt,nightly-polars
            default-features:
            addl-qsvlite-features:
            addl-qsvdp-features:
            addl-rustflags: -C target-cpu=native -Z unstable-options -C panic=immediate-abort
          - os: windows-latest
            os-name: windows
            target: x86_64-pc-windows-msvc
            architecture: x86_64
            addl-build-args: --features=apply,fetch,nightly,self_update,polars,geocode,to,lens,prompt,nightly-polars
            # Windows: jemallocator is not supported on Windows, so we use the system allocator.
            default-features: --no-default-features
            addl-qsvlite-features:
            addl-qsvdp-features:
            addl-rustflags: -C target-cpu=native -Z unstable-options -C panic=immediate-abort

    steps:
    - name: Installing Rust toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.rust }}
        components: rust-src
        target: ${{ matrix.job.target }}
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        ref: ${{ needs.analyze-tags.outputs.previous-tag }}
    - name: build prep for x86_64-unknown-linux-musl
      if: ${{ matrix.job.musl-prep }}
      run: |
        sudo apt-get install musl-tools musl-dev
        sudo ln -s /usr/bin/g++ /usr/bin/musl-g++
    - name: apt-get update Ubuntu, libwayland-dev
      if: ${{ matrix.job.os-name == 'linux' }}
      run: |
        sudo apt-get update
        sudo apt-get install libwayland-dev
    - uses: actions/setup-python@v6.2.0
      with:
        python-version: '3.13'
    # actions-rs/cargo is archived/Node20-deprecated (qsv #4002), so invoke cargo directly.
    # All targets here build with plain cargo (no use-cross: true), so the cross/cargo
    # conditional is unneeded. `+${{ matrix.rust }}` pins the toolchain to guard against a
    # stale per-directory rustup override on self-hosted runners.
    - name: Build qsv-nightly
      # env:
      #   RUSTFLAGS: --emit=asm
      env:
        RUSTFLAGS: ${{ matrix.job.addl-rustflags }}
      shell: bash
      run: cargo +${{ matrix.rust }} build --profile ${{ contains(matrix.job.addl-build-args, 'luau') && 'release-luau' || 'release' }} --bin qsv -Z build-std=std --target ${{ matrix.job.target }} ${{ matrix.job.addl-build-args }},feature_capable,nightly ${{ matrix.job.default-features }}
    - name: Build qsvlite-nightly
      env:
        RUSTFLAGS: --emit=asm ${{ matrix.job.addl-rustflags }}
      shell: bash
      run: cargo +${{ matrix.rust }} build --release --bin qsvlite -Z build-std=std --features=lite,self_update,nightly,${{ matrix.job.addl-qsvlite-features }} --target ${{ matrix.job.target }} ${{ matrix.job.default-features }}
    - name: Build qsvmcp-nightly
      if: ${{ matrix.job.target != 'x86_64-unknown-linux-musl' }}
      env:
        RUSTFLAGS: --emit=asm ${{ matrix.job.addl-rustflags }}
      shell: bash
      run: cargo +${{ matrix.rust }} build --release --bin qsvmcp -Z build-std=std ${{ matrix.job.addl-qsvlite-features != '' && format('--features=qsvmcp,nightly,{0}', matrix.job.addl-qsvlite-features) || '--features=qsvmcp,nightly' }} --target ${{ matrix.job.target }} ${{ matrix.job.default-features }}
    # TODO: Add qsvdp-nightly build back in after v5.0.3, be sure to copy qsvdp binaries below
    # - name: Build qsvdp-nightly
    #   env:
    #     RUSTFLAGS: --emit=asm ${{ matrix.job.addl-rustflags }}
    #   shell: bash
    #   run: cargo +${{ matrix.rust }} build --release --bin qsvdp -Z build-std=std -Z unstable-options --features=datapusher_plus,nightly,${{ matrix.job.addl-qsvdp-features }} --target ${{ matrix.job.target }} ${{ matrix.job.default-features }}
    - name: Copy binaries to working dir
      shell: bash
      run: |
        mkdir qsv-${{ needs.analyze-tags.outputs.previous-tag }}
        # qsv uses release-luau (panic=unwind, qsv #3937) when built with luau, else release; the other bins use release
        for d in release-luau release; do
          rm -f target/${{ matrix.job.target }}/$d/*.d 2>/dev/null || true
          cp target/${{ matrix.job.target }}/$d/qsv* qsv-${{ needs.analyze-tags.outputs.previous-tag }} 2>/dev/null || true
        done
        cd qsv-${{ needs.analyze-tags.outputs.previous-tag }}
        if [ "$RUNNER_OS" == "Windows"]; then
             mv qsv.exe qsv_nightly.exe
             mv qsvlite.exe qsvlite_nightly.exe
             if [ -f qsvmcp.exe ]; then mv qsvmcp.exe qsvmcp_nightly.exe; fi
        else
             mv qsv qsv_nightly
             mv qsvlite qsvlite_nightly
             if [ -f qsvmcp ]; then mv qsvmcp qsvmcp_nightly; fi
        fi
        rustup show > qsv_nightly_rust_version_info.txt
        cd ..
    - name: install zipsign
      run: |
        cargo install zipsign
    - name: Fetch zipsign private key
      # replaces mobiledevops/secret-to-file-action (Node20-deprecated, qsv #4002):
      # decode the base64 secret to qsvpriv.key. bash shell + `base64 -d` work on all
      # runners (incl. Windows git-bash, macOS/BSD). Secret passed via env, not inlined.
      shell: bash
      env:
        ZIPSIGN_KEY: ${{ secrets.QSV_ZIPSIGN_PRIV_KEY }}
      run: printf '%s' "$ZIPSIGN_KEY" | base64 -d > qsvpriv.key
    - name: Download latest release zip
      uses: robinraju/release-downloader@v1.13
      with:
        repository: "dathere/qsv"
        latest: true
        preRelease: true
        token: ${{ secrets.GITHUB_TOKEN }}
        fileName: qsv-${{ needs.analyze-tags.outputs.previous-tag }}-${{ matrix.job.target }}.zip
    - name: remove zipsign signature from zip archive
      run: |
        zipsign unsign zip qsv-${{ needs.analyze-tags.outputs.previous-tag }}-${{ matrix.job.target }}.zip
    - name: add/update nightly files to zip
      run: 7z u -tzip qsv-${{ needs.analyze-tags.outputs.previous-tag }}-${{ matrix.job.target }}.zip ./qsv-${{ needs.analyze-tags.outputs.previous-tag }}/qsv* -mx=9 -mmt=on
    - name: re-zipsign zip archive
      run: |
        zipsign sign zip qsv-${{ needs.analyze-tags.outputs.previous-tag }}-${{ matrix.job.target }}.zip qsvpriv.key
    - name: Upload zipped binaries to release
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: qsv-${{ needs.analyze-tags.outputs.previous-tag }}-${{ matrix.job.target }}.zip
        asset_name: qsv-${{ needs.analyze-tags.outputs.previous-tag }}-${{ matrix.job.target }}.zip
        prerelease: true
        make_latest: false
        overwrite: true
        tag: ${{ needs.analyze-tags.outputs.previous-tag }}    
 
