name: Windows - ARM64

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

concurrency:
  group: ci-windows-arm-tests-${{ github.ref }}-1
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    # Skip CI for MCP-only commits (commit message contains "(mcp):")
    if: |
      github.event_name != 'push' ||
      !contains(github.event.head_commit.message, '(mcp):')

    runs-on: windows-11-arm

    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6.2.0
      with:
        python-version: '3.13'
    - name: Installing Rust toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: stable
    - name: Setup Rust-cache
      uses: Swatinem/rust-cache@v2
      with:
        key: qsv-winarm64cache
    - name: make empty DLLs directory to prevent spurious python warning
      run: |
        mkdir DLLs   
    # TEMP DIAGNOSTIC: tracking sniff_url_snappy hang on Windows ARM64.
    # Builds qsv and invokes the exact command the hanging test runs, with a
    # 5-minute hard timeout. The qsv binary emits "[diag] ..." breadcrumbs
    # directly to stderr (not the qsv log file) so each boundary it crosses
    # is visible in CI live, even if the next stage hangs. The last
    # breadcrumb seen tells us which boundary the process never crossed.
    # Remove this step once the root cause is identified and fixed.
    - name: Diagnose sniff_url_snappy hang
      timeout-minutes: 5
      env:
          RUSTFLAGS: -C debuginfo=0
          RUST_BACKTRACE: 1
      continue-on-error: true
      run: |
        cargo build --locked --no-default-features --features=mimalloc,apply,fetch,foreach,luau,python,polars,feature_capable,ui --bin qsv
        ./target/debug/qsv.exe sniff https://github.com/dathere/qsv/raw/master/resources/test/boston311-100.csv.sz
    - name: Run tests
      env:
          RUSTFLAGS: -C debuginfo=0
      #   RUSTFLAGS: -C target-cpu=native
      run: cargo test --verbose --locked --no-default-features --features=mimalloc,apply,fetch,foreach,luau,python,polars,feature_capable,ui
