name: Deploy viz gallery to Pages

# Publishes examples/viz/ (the interactive viz gallery + its smart-dashboard
# iframes and sample datasets) AND benchmarks/ (the interactive benchmark
# dashboard, generated by scripts/gen_benchmark_viz.py) to GitHub Pages, so the
# charts render with the correct text/html content type — no third-party proxy.
# Gallery URL:    https://dathere.github.io/qsv/gallery.html
# Benchmarks URL: https://dathere.github.io/qsv/benchmarks/

on:
  push:
    branches: [master]
    paths:
      - 'examples/viz/**'
      - 'benchmarks/**'
      - '.github/workflows/viz-gallery-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/configure-pages@v6
      # Stage a site tree so both the gallery and the benchmark dashboard deploy
      # while EXISTING URLs stay intact: examples/viz becomes the site root (so
      # gallery.html and its relative iframe srcs/datasets resolve unchanged), and
      # benchmarks/ is served under /benchmarks/.
      - name: Stage site
        run: |
          mkdir -p _site
          cp -r examples/viz/. _site/
          mkdir -p _site/benchmarks
          cp -r benchmarks/. _site/benchmarks/
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v5
