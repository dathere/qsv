# Wiki lint — keeps the project Wiki in sync with the actual command set.
#
# GitHub Actions doesn't run from inside `<repo>.wiki`, so this workflow
# lives in the main qsv repo and pulls the wiki in as a second checkout.
#
# It performs two checks via scripts/lint.sh in the wiki repo:
#   1. Every `qsv <command>` reference in a wiki page (inside fenced code
#      blocks or inline backticks) is in `qsv --list`.
#   2. Every `/docs/help/<X>.md` link in the wiki resolves to a real file
#      in this repo's docs/help/ directory.
#
# It also verifies that docs/help/ is not STALE. Those files are generated from
# each command's docopt USAGE string by `qsv --generate-help-md` and must never be
# hand-edited, but nothing used to fail when a USAGE change landed without the
# regeneration -- the wiki would then link to help text that no longer matched the
# binary. This job already builds `qsv -F all_features` and already triggers on
# exactly the generator's inputs (src/cmd/**, src/main.rs, docs/help/**), so the
# check rides along for free rather than paying for a second 10-minute build.
#
# Triggers:
#   - Nightly cron
#   - PRs touching src/cmd/, src/main.rs, or docs/help/
#   - Manual workflow_dispatch
#
# Nightly failures open (or comment on) a sticky issue tagged `wiki-lint`.

name: Wiki lint

on:
  schedule:
    - cron: '17 4 * * *'   # nightly @ 04:17 UTC
  pull_request:
    paths:
      - 'src/cmd/**'
      - 'src/main.rs'
      - 'docs/help/**'
      # README.md is a generator INPUT, not just an output: `--generate-help-md`
      # reads the command table for each command's description blurb, so a
      # README-only edit rewrites docs/help/*.md and TableOfContents.md.
      - 'README.md'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/wiki-lint.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write   # only used by the scheduled-failure-opens-issue step

concurrency:
  group: wiki-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout qsv source
        uses: actions/checkout@v7

      - name: Checkout wiki
        uses: actions/checkout@v7
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki

      # `cargo build --bin qsv -F all_features` pulls in pyo3, datasketches,
      # polars, etc. and the ubuntu-latest runner has occasionally crashed
      # mid-build with "No space left on device" (see PR #3856 / run
      # 25923503208). Free ~20+ GB of pre-installed tooling we don't use:
      # Android SDK, .NET, Haskell, and the unused share of the tool cache.
      # We keep `large-packages: false` because apt-get cleanup is slow.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be   # v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: true

      - name: apt-get update Ubuntu, libwayland-dev
        run: |
          sudo apt-get update
          sudo apt-get install libwayland-dev
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.13'
      - name: Install and Run Redis
        run: |
          sudo apt-get install redis-server
          sudo service redis-server start
      - name: Installing Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build qsv (PR source / nightly latest-master)
        run: |
          cargo build --locked --bin qsv -F all_features
          sudo install target/debug/qsv /usr/local/bin/qsv
          qsv --version

      # docs/help/*.md is GENERATED from the docopt USAGE strings. Regenerate and
      # diff: if anything moves, the PR edited a USAGE (or README table row) without
      # re-running the generator. `git diff` is scoped to the generated paths so the
      # wiki checkout and build artifacts cannot trip it.
      - name: Generated help docs are up to date
        run: |
          qsv --generate-help-md
          # `git status --porcelain`, not `git diff`: diff sees only TRACKED paths, so a
          # brand-new command's freshly generated docs/help/<cmd>.md would be untracked
          # and invisible. Porcelain reports modified AND untracked AND deleted.
          drift="$(git status --porcelain -- docs/help README.md)"
          if [ -n "$drift" ]; then
            echo "::error::docs/help/ is stale. A USAGE string or README table row changed without regenerating."
            echo "Run 'qsv --generate-help-md' and commit the result. Never hand-edit docs/help/*.md."
            echo "--- drift ---"
            echo "$drift"
            git --no-pager diff -- docs/help README.md | head -200
            exit 1
          fi
          echo "docs/help/ is in sync with the USAGE strings and the README command table."

      - name: Run wiki lint
        env:
          QSV_REPO_PATH: ${{ github.workspace }}
        run: |
          chmod +x wiki/scripts/lint.sh
          cd wiki
          ./scripts/lint.sh

      - name: Open issue if nightly lint fails
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v9
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'wiki-lint',
              state: 'open',
            });
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              "The nightly **wiki-lint** check failed.",
              "",
              "It found references to qsv commands that are no longer present in `qsv --list`, or links to `/docs/help/<X>.md` files that no longer exist.",
              "",
              `**Run:** ${runUrl}`,
              "",
              "To reproduce locally:",
              "```bash",
              "git clone https://github.com/${{ github.repository }}.wiki.git",
              "cd $(basename $_ .git)",
              "QSV_REPO_PATH=/path/to/your/qsv-checkout ./scripts/lint.sh",
              "```",
              "",
              "**Fix:** update the wiki page referenced in the error output to use the current command name, or add the page's content to scripts/lint.allowlist if it's a deliberate placeholder.",
            ].join("\n");
            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: "Wiki lint: stale command references",
                body,
                labels: ["wiki-lint", "documentation"],
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: `Another nightly lint failure: ${runUrl}`,
              });
            }
