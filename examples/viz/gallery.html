 <h1>qsv viz &mdash; chart gallery</h1>
 <p>Every chart type produced by <code>qsv viz</code>, from the sample datasets in

<div class="grid">
<figure class="cell full"><figcaption><span class="t">smart dashboard (--smarter, geospatial)</span><span class="d">One `qsv viz smart seismic_events.csv --smarter --theme plotly_dark --grid-cols 3 --geojson japan_prefectures.geojson --feature-id-key properties.id` command, 11 auto-chosen panels — nearly every panel type at once on a synthetic catalog of Japanese earthquakes. Things the raw table hides but the dashboard makes obvious: depth_km is <b>bimodal</b> (two populations — shallow interplate quakes ~20&nbsp;km and the deep Wadati-Benioff slab ~450&nbsp;km — so --smarter draws a histogram, not a box that would average the peaks away); the points trace Japan's subduction arcs on the map; and a <b>prefecture choropleth</b> bins each quake into the GeoJSON region that contains it (point-in-polygon, no geocoding). Most of this catalog is offshore Pacific seismicity, so under the default 10&nbsp;km snap cap the far-offshore quakes are dropped (287 of 417 here — the panel title reports it) and the on-land/near-coast prefectures are colored; raise <code>--snap-max-dist</code> to snap distant quakes to the nearest prefecture instead, or <code>--no-snap</code> to drop every offshore point. magnitude vs felt_reports is almost perfectly correlated (r=0.95); magnitude and felt_reports are right-skewed with flagged outliers; and the magnitude-over-time trend spikes during a September aftershock sequence. Coordinate columns are shown on the map only, not re-charted as distributions. Rendered with the built-in <code>plotly_dark</code> theme.</span></figcaption><iframe src="smart_geospatial.html" class="dash" scrolling="no" loading="lazy" title="smart dashboard (--smarter, geospatial)"></iframe></figure>
<figure class="cell full"><figcaption><span class="t">smart dashboard (geographic outliers)</span><span class="d">`qsv viz smart delivery_stops.csv` — delivery stops clustered in metro Denver with four bad-geocode strays. Points far from the cluster centroid (beyond the Tukey far-out fence of their distances) are flagged as geographic <b>outliers</b>: drawn as distinct amber markers, drawn outside the purple (filled) spatial-extent box, and excluded from the auto-zoom — so the default view stays tight on the core cluster. A second, dashed-magenta no-fill box marks the full extent (core + outliers); use the <b>Core extent</b> / <b>Full extent</b> buttons at the top-left of the map to jump between the tight core view and the full spread (where the strays and the magenta box become visible). In the full <code>qsv viz smart</code> HTML output the spatial-extent label calls them out — <i>Colorado, United States &mdash; 4 outliers (Wyoming, Kansas &amp; Nebraska)</i> — while strays within the core's own jurisdiction are folded back in silently instead. Each stop also carries delivery attributes (<code>packages</code>, <code>weight_kg</code>, <code>distance_km</code>, <code>delivery_minutes</code>, a <code>vehicle</code> class and a <code>delivered_date</code>), so beyond the map the auto-profiler fills the dashboard out with box plots, frequency bars, a correlation heatmap, the strongest-pair scatter (packages vs weight_kg) and a delivered-over-time trend — all without <code>--smarter</code>.</span></figcaption><iframe src="smart_geo_outliers.html" class="dash" scrolling="no" loading="lazy" title="smart dashboard (geographic outliers)"></iframe></figure>
<figure class="cell full"><figcaption><span class="t">smart dashboard</span><span class="d">Auto-profiled overview: correlation heatmap + box plots + frequency bars, led by a drill-down sunburst. `viz smart` now SKIPS an auto hierarchy when the candidate dimensions are statistically independent (nesting them would just replicate each level's marginal); sales_sample's region/payment_method/product_category are independent, so `--hierarchy-style sunburst` is passed to deliberately showcase the interactive sunburst.</span></figcaption><iframe src="smart_sales.html" class="dash" scrolling="no" loading="lazy" title="smart dashboard"></iframe></figure>
<figure class="cell full"><figcaption><span class="t">smart dashboard (--smarter)</span><span class="d">Same auto-profiler with `--smarter`, which runs `qsv moarstats --advanced` itself to enrich the stats cache in one step: the bimodal monthly_spend column renders as a histogram (a box plot would hide its two peaks), and the skewed account_age_days box is annotated with its skew direction and outlier share.</span></figcaption><iframe src="smart_smarter.html" class="dash" scrolling="no" loading="lazy" title="smart dashboard (--smarter)"></iframe></figure>

<figure class="cell"><figcaption><span class="t">sunburst</span><span class="d">Three-level hierarchy (region -> product_category -> payment_method) as concentric rings, sized by row count; inner rings are parents, outer rings their children. Opens at two rings (maxdepth) so labels stay legible instead of crowding a ~100-sector outer ring; click a sector to drill in and the deeper ring's labels grow back. Hover always shows value + percent.</span></figcaption><div id="g22" class="plot"></div></figure>

<figure class="cell"><figcaption><span class="t">choropleth</span><span class="d">Filled-region map coloring countries by GDP, matched by ISO-3 code on a token-free projection basemap. Use --location-mode usa-states / country-names / geojson-id for other region keys, --map for a MapLibre tile basemap, or --geocode to derive codes from lat/lon or place names.</span></figcaption><div id="g26" class="plot"></div></figure>
<figure class="cell"><figcaption><span class="t">choropleth (US states)</span><span class="d">Same chart, <code>--location-mode usa-states</code>: state codes matched to Plotly's built-in US-state geometry on the token-free albers-usa projection (CONUS + Alaska/Hawaii insets) — no GeoJSON needed. States are colored by renewable-electricity share.</span></figcaption><div id="g27" class="plot"></div></figure>
<figure class="cell full"><figcaption><span class="t">choropleth (MapLibre + GeoJSON)</span><span class="d"><code>--map</code> draws the filled regions on an interactive MapLibre <b>tile</b> basemap (token-free carto-positron) instead of a projection. The regions come from a custom GeoJSON (<code>--geojson</code> local file or URL) matched to the data by <code>--feature-id-key</code> — here the near-rectangular western states, colored by installed wind capacity. The view auto-centers and zooms to the GeoJSON extent (shown full-width so the computed zoom frames the regions as the CLI does — a tile map's zoom is fixed, so a narrow grid cell would crop it).</span></figcaption><div id="g28" class="plot"></div></figure>
<figure class="cell full"><figcaption><span class="t">smart dashboard (time-series)</span><span class="d">Auto dashboard for stock_prices: a time-series trend panel (the first numeric column over the date) leads, alongside box-plot summaries of the OHLC columns.</span></figcaption><iframe src="smart_timeseries.html" class="dash" scrolling="no" loading="lazy" title="smart dashboard (time-series)"></iframe></figure>
<figure class="cell full"><figcaption><span class="t">smart dashboard (per-US-state choropleth)</span><span class="d">`qsv viz smart us_cities.csv` — `viz smart` reverse-geocodes each point; because every city resolves to a US state, it adds a per-US-<b>state</b> choropleth (cities-per-state, albers-usa) beside the point map, alongside the usual box plots, frequency bars and the strongest-pair scatter. (The point map's <i>spatial extent</i> caption counts the data's bounding-box corners, which spill into neighboring countries and ocean — the choropleth instead resolves each city to its own state.) No flags, no LLM — the state fill is derived purely from the lat/lon columns.</span></figcaption><iframe src="smart_us_choropleth.html" class="dash" scrolling="no" loading="lazy" title="smart dashboard (per-US-state choropleth)"></iframe></figure>
<figure class="cell full"><figcaption><span class="t">smart dashboard (--dictionary infer, treemap)</span><span class="d">Auto dashboard for customer_spend with a describegpt-inferred Data Dictionary (--dictionary infer) guiding panel selection & field labels. Two categorical dimensions (plan, region) form a shallow part-to-whole hierarchy, auto-rendered as a TREEMAP (area = size). Requires a local LLM; the committed HTML is reused on regen.</span></figcaption><iframe src="smart_dict_treemap.html" class="dash" scrolling="no" loading="lazy" title="smart dashboard (--dictionary infer, treemap)"></iframe></figure>
<figure class="cell full"><figcaption><span class="t">smart dashboard (--dictionary infer, sunburst)</span><span class="d">Auto dashboard for sales_sample with a describegpt-inferred Data Dictionary. Its three categorical dimensions are statistically independent, so the auto-profiler skips the hierarchy by default; `--hierarchy-style sunburst` forces a SUNBURST here (concentric rings emphasize parent-child structure) to showcase the chart. Requires a local LLM; the committed HTML is reused on regen.</span></figcaption><iframe src="smart_dict_sunburst.html" class="dash" scrolling="no" loading="lazy" title="smart dashboard (--dictionary infer, sunburst)"></iframe></figure>
<figure class="cell full"><figcaption><span class="t">smart dashboard (--dictionary infer, world choropleth)</span><span class="d">`qsv viz smart world_cities.csv --dictionary infer` — cities across all <b>seven continents</b>: `viz smart` reverse-geocodes the points and adds a per-<b>country</b> choropleth (cities-per-country, ISO-3) <b>framed to the filled-country geometries</b> via Plotly <code>fitbounds</code> — so the regions are never clipped at the viewport edge — beside the natural-earth point map (crimson markers so coastal/island points read against the ocean), plus a seven-continent breakdown. A describegpt-inferred Data Dictionary supplies the friendly field labels (e.g. <i>Metro Population</i>, <i>Avg Annual Temp</i>). <b>Note:</b> the choropleth is <i>reverse-geocoded</i> from lat/lon, so the two Antarctic stations — which have no sovereign country — snap to the nearest administering territory (McMurdo&nbsp;&rarr;&nbsp;NZ&apos;s Ross Dependency, Rothera&nbsp;&rarr;&nbsp;the Argentine sector); the seven-continent grouping instead comes from the dataset&apos;s own <code>continent</code> column. Requires a local LLM; the committed HTML is reused on regen.</span></figcaption><iframe src="smart_world_choropleth.html" class="dash" scrolling="no" loading="lazy" title="smart dashboard (--dictionary infer, world choropleth)"></iframe></figure>
