<figure class="cell full"><figcaption><span class="t">smart dashboard (--smarter, geospatial)</span><span class="d">One `qsv viz smart seismic_events.csv --smarter` command, 9 auto-chosen panels — nearly every panel type at once on a synthetic catalog of Japanese earthquakes. Things the raw table hides but the dashboard makes obvious: depth_km is <b>bimodal</b> (two populations — shallow interplate quakes ~20&nbsp;km and the deep Wadati-Benioff slab ~450&nbsp;km — so --smarter draws a histogram, not a box that would average the peaks away); the points trace Japan's subduction arcs on the map; magnitude vs felt_reports is almost perfectly correlated (r=0.95); magnitude and felt_reports are right-skewed with flagged outliers; and the magnitude-over-time trend spikes during a September aftershock sequence. Coordinate columns are shown on the map only, not re-charted as distributions. Rendered with the built-in <code>plotly_dark</code> theme (<code>--theme plotly_dark</code>).</span></figcaption><div style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px"><div id="g2-p0" style="height:340px"></div><div id="g2-p1" style="height:340px"></div><div id="g2-p2" style="height:340px"></div><div id="g2-p3" style="height:340px"></div><div id="g2-p4" style="height:340px"></div><div id="g2-p5" style="height:340px"></div><div id="g2-p6" style="height:340px"></div><div id="g2-p7" style="height:340px"></div><div id="g2-p8" style="height:340px"></div><div id="g2-p9" style="height:340px"></div></div></figure>
