<script>
(function () {
  var themeDefaultMode = "system";
  var DARK = { paper: "#111111", plot: "#111111", font: "#f2f5fa", grid: "#283442", line: "#506784", zero: "#283442", bg: "#111111", land: "#2a3138", water: "#16202b", mapbox: "carto-darkmatter" };
  var LIGHT = { paper: "#FFFFFF", plot: "#FFFFFF", font: "#2A3F5F", grid: "#ECECEC", line: "#BCC4CE", zero: "#ECECEC", bg: "#FFFFFF", land: "#d3d3d3", water: "#add8e6", mapbox: "carto-positron" };
  function isDark() {
    try {
      var saved = localStorage.getItem("qsv-viz-theme");
      if (saved === "dark") return true;
      if (saved === "light") return false;
    } catch (e) {}
    if (themeDefaultMode === "dark") return true;
    if (themeDefaultMode === "light") return false;
    return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
  }
  function buildUpdate(gd, p) {
    var u = { "paper_bgcolor": p.paper, "font.color": p.font };
    var lay = gd.layout || {};
    var hasAxis = false;
    Object.keys(lay).forEach(function (k) {
      if (/^xaxis\d*$/.test(k) || /^yaxis\d*$/.test(k)) {
        hasAxis = true;
        u[k + ".gridcolor"] = p.grid;
        u[k + ".linecolor"] = p.line;
        u[k + ".zerolinecolor"] = p.zero;
        u[k + ".tickcolor"] = p.line;
      }
      if (/^geo\d*$/.test(k)) {
        u[k + ".bgcolor"] = p.bg;
        u[k + ".landcolor"] = p.land;
        u[k + ".oceancolor"] = p.water;
        u[k + ".lakecolor"] = p.water;
      } else if (/^mapbox\d*$/.test(k) || /^map\d*$/.test(k)) {
        u[k + ".style"] = p.mapbox;
      } else if (/^polar\d*$/.test(k) || /^scene\d*$/.test(k)) {
        u[k + ".bgcolor"] = p.bg;
      }
    });
    if (hasAxis) u["plot_bgcolor"] = p.plot;
    return u;
  }
  function apply(dark) {
    document.body.classList.toggle("qsv-dark", dark);
    var p = dark ? DARK : LIGHT;
    document.querySelectorAll(".js-plotly-plot").forEach(function (gd) {
      try { Plotly.relayout(gd, buildUpdate(gd, p)); } catch (e) {}
    });
  }
  function init() {
    var dark = isDark();
    apply(dark);
    var btn = document.getElementById("qsv-theme-toggle");
    if (btn) btn.addEventListener("click", function () {
      var nowDark = !document.body.classList.contains("qsv-dark");
      try { localStorage.setItem("qsv-viz-theme", nowDark ? "dark" : "light"); } catch (e) {}
      apply(nowDark);
    });
  }
  if (document.readyState === "loading")
    document.addEventListener("DOMContentLoaded", function () { setTimeout(init, 0); });
  else setTimeout(init, 0);
})();
</script>
