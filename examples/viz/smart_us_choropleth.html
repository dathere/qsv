<style>
  body { font-family: Helvetica Neue, Helvetica, Arial, sans-serif; color: var(--qsv-page-ink); background: var(--qsv-page-bg); margin: 0; padding: 16px; }
  h1.qsv-viz-title { font-size: 20px; font-weight: 600; text-align: center; margin: 8px 0 20px; }
  .qsv-viz-geo-meta { font-size: 13px; color: var(--qsv-geo-meta); text-align: center; padding: 8px 4px 4px; }
  .qsv-viz-dict-link { font-size: 13px; text-align: center; margin: -12px 0 16px; }
  .qsv-viz-dict-link a { color: var(--qsv-geo-meta); }
  table.qsv-viz-meta { margin: 0 auto 20px; border-collapse: collapse; font-size: 13px; }
  table.qsv-viz-meta td { padding: 2px 10px; vertical-align: top; }
  table.qsv-viz-meta td.qsv-viz-meta-k { color: var(--qsv-geo-meta); text-align: right; white-space: nowrap; }
  #qsv-logo { position: fixed; bottom: 12px; right: 12px; z-index: 999; opacity: 0.95; line-height: 0; }
  #qsv-logo:hover { opacity: 1; }
  /* Theme-aware halo so the logo stays legible on any paper color: a faint dark
     outline on light themes, a light outline under body.qsv-dark so the navy
     shield reads against near-black dark-theme paper. Keyed on body.qsv-dark, so
     it follows the runtime Theme toggle, not just the initial --theme. */
  #qsv-logo img { height: 28px; width: auto; display: block; filter: drop-shadow(0 0 2px rgba(0, 0, 0, 0.45)); }
  #qsv-logo .qsv-logo-dark { display: none; }
  body.qsv-dark #qsv-logo .qsv-logo-light { display: none; }
  body.qsv-dark #qsv-logo .qsv-logo-dark { display: block; }
  body.qsv-dark #qsv-logo img { filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.6)) drop-shadow(0 0 1px rgba(255, 255, 255, 0.45)); }
  :root { --qsv-page-bg: #FFFFFF; --qsv-page-ink: #2A3F5F; --qsv-geo-meta: #4b5563; }
  body.qsv-dark { --qsv-page-bg: #111111; --qsv-page-ink: #f2f5fa; --qsv-geo-meta: #9aa4b2; }
  /* Bottom-right, stacked just above the #qsv-logo: keeps the toggle clear of the Plotly modebar
     (always top-right, and hover-revealed) — which would otherwise overlap and block the modebar's
     rightmost buttons, including the fullscreen toggle — and of the geo extent menus (top-left). */
  #qsv-theme-toggle { position: fixed; bottom: 50px; right: 12px; z-index: 1000; font: 13px Helvetica Neue, Helvetica, Arial, sans-serif; padding: 6px 12px; border-radius: 6px; border: 1px solid var(--qsv-page-ink); background: var(--qsv-page-bg); color: var(--qsv-page-ink); cursor: pointer; opacity: 0.85; }
  #qsv-theme-toggle:hover { opacity: 1; }
  .js-plotly-plot:fullscreen { background: var(--qsv-page-bg, #ffffff); }
  .qsv-viz-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
  .qsv-viz-cell { min-width: 0; position: relative; }
  .qsv-viz-cell.full-width { grid-column: 1 / -1; }
  .qsv-viz-plot { width: 100%; }
</style>

<script>
(function () {

  var LIGHT = { paper: "#FFFFFF", plot: "#FFFFFF", font: "#2A3F5F", grid: "#ECECEC", line: "#BCC4CE", zero: "#ECECEC", bg: "#FFFFFF", land: "#d3d3d3", water: "#add8e6", mapStyle: "carto-positron", mapStyleNoLabels: "carto-positron-nolabels" };

    // so a "light" toggle on one dashboard must not override --theme plotly_dark
    // on another).

    if (themeDefaultMode === "light") return false;

        u[k + ".zerolinecolor"] = p.zero;
        u[k + ".tickcolor"] = p.line;

        u[k + ".landcolor"] = p.land;
        u[k + ".oceancolor"] = p.water;

      var u = buildUpdate(gd, p);

        if (hasMapLibre(gd)) {

          // undefined" on a relayout/react in our pinned plotly fork, so fold the theme update
          // (incl. the basemap `.style`) into a full Plotly.newPlot — the only primitive that
          // safely restyles it without blanking the layer. Preserve the injected fullscreen
          // modebar button via the div's existing config.
          Object.keys(u).forEach(function (k) { setPath(gd.layout, k, u[k]); });
          // Re-theme any "Basemap labels" toggle: its baked `map.style` args point at the
          // render-time theme's basemap, so rewrite each to the target theme's variant, preserving
          // the arg's own `-nolabels` suffix (labeled arg -> mapStyle, no-labels arg ->
          // mapStyleNoLabels). Guarded on the `map.style` key so non-map menus are untouched.
          (gd.layout.updatemenus || []).forEach(function (menu) {
            (menu.buttons || []).forEach(function (b) {
              ["args", "args2"].forEach(function (ak) {
                var a = b[ak];
                if (a && a[0] && typeof a[0]["map.style"] === "string") {
                  a[0]["map.style"] = /-nolabels$/.test(a[0]["map.style"]) ? p.mapStyleNoLabels : p.mapStyle;
                }

          if (window.__qsvRefitScrollZoom) window.__qsvRefitScrollZoom(gd);

    var reT;

    });
  }
  if (document.readyState === "loading")
    document.addEventListener("DOMContentLoaded", function () { setTimeout(init, 0); });
  else setTimeout(init, 0);
})();
</script>
