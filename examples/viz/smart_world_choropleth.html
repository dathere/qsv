<style>
  body { font-family: Helvetica Neue, Helvetica, Arial, sans-serif; color: var(--qsv-page-ink); background: var(--qsv-page-bg); margin: 0; padding: 16px; }
  h1.qsv-viz-title { font-size: 20px; font-weight: 600; text-align: center; margin: 8px 0 20px; }
  .qsv-viz-geo-meta { font-size: 13px; color: var(--qsv-geo-meta); text-align: center; padding: 8px 4px 4px; }
  #qsv-logo { position: fixed; bottom: 12px; right: 12px; z-index: 999; opacity: 0.95; line-height: 0; }
  #qsv-logo:hover { opacity: 1; }
  /* Theme-aware halo so the logo stays legible on any paper color: a faint dark
     outline on light themes, a light outline under body.qsv-dark so the navy
     shield reads against near-black dark-theme paper. Keyed on body.qsv-dark, so
     it follows the runtime Theme toggle, not just the initial --theme. */
  #qsv-logo img { height: 28px; width: auto; display: block; filter: drop-shadow(0 0 2px rgba(0, 0, 0, 0.45)); }
  #qsv-logo .qsv-logo-dark { display: none; }
  body.qsv-dark #qsv-logo .qsv-logo-light { display: none; }
  body.qsv-dark #qsv-logo .qsv-logo-dark { display: block; }
  body.qsv-dark #qsv-logo img { filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.6)) drop-shadow(0 0 1px rgba(255, 255, 255, 0.45)); }
  :root { --qsv-page-bg: #FFFFFF; --qsv-page-ink: #2A3F5F; --qsv-geo-meta: #4b5563; }
  body.qsv-dark { --qsv-page-bg: #111111; --qsv-page-ink: #f2f5fa; --qsv-geo-meta: #9aa4b2; }
  /* Bottom-right, stacked just above the #qsv-logo: keeps the toggle clear of the Plotly modebar
     (always top-right, and hover-revealed) — which would otherwise overlap and block the modebar's
     rightmost buttons, including the fullscreen toggle — and of the geo extent menus (top-left). */
  #qsv-theme-toggle { position: fixed; bottom: 50px; right: 12px; z-index: 1000; font: 13px Helvetica Neue, Helvetica, Arial, sans-serif; padding: 6px 12px; border-radius: 6px; border: 1px solid var(--qsv-page-ink); background: var(--qsv-page-bg); color: var(--qsv-page-ink); cursor: pointer; opacity: 0.85; }
  #qsv-theme-toggle:hover { opacity: 1; }
  .js-plotly-plot:fullscreen { background: var(--qsv-page-bg, #ffffff); }
  .qsv-viz-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
  .qsv-viz-cell { min-width: 0; }
  .qsv-viz-cell.full-width { grid-column: 1 / -1; }
  .qsv-viz-plot { width: 100%; }
</style>

  var LIGHT = { paper: "#FFFFFF", plot: "#FFFFFF", font: "#2A3F5F", grid: "#ECECEC", line: "#BCC4CE", zero: "#ECECEC", bg: "#FFFFFF", land: "#d3d3d3", water: "#add8e6", mapbox: "carto-positron" };
  function isDark() {
    // An explicit --theme is authoritative: it wins over a stale cross-dashboard
    // saved preference (the localStorage key is shared across all qsv viz pages,
    // so a "light" toggle on one dashboard must not override --theme plotly_dark
    // on another).
    if (themeDefaultMode === "dark") return true;
    if (themeDefaultMode === "light") return false;
    // No --theme: defer to the viewer's saved choice, then OS preference.
    try {
      var saved = localStorage.getItem("qsv-viz-theme");
      if (saved === "dark") return true;
      if (saved === "light") return false;
    } catch (e) {}
    return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
  }
  function buildUpdate(gd, p) {
    var u = { "paper_bgcolor": p.paper, "font.color": p.font };
    var lay = gd.layout || {};
    var hasAxis = false;
    Object.keys(lay).forEach(function (k) {
      if (/^xaxis\d*$/.test(k) || /^yaxis\d*$/.test(k)) {
        hasAxis = true;
        u[k + ".gridcolor"] = p.grid;
        u[k + ".linecolor"] = p.line;
        u[k + ".zerolinecolor"] = p.zero;
        u[k + ".tickcolor"] = p.line;
      }
      if (/^geo\d*$/.test(k)) {
        u[k + ".bgcolor"] = p.bg;
        u[k + ".landcolor"] = p.land;
        u[k + ".oceancolor"] = p.water;
        u[k + ".lakecolor"] = p.water;
      } else if (/^mapbox\d*$/.test(k) || /^map\d*$/.test(k)) {
        u[k + ".style"] = p.mapbox;
      } else if (/^polar\d*$/.test(k) || /^scene\d*$/.test(k)) {
        u[k + ".bgcolor"] = p.bg;
      }
    });
    if (hasAxis) u["plot_bgcolor"] = p.plot;
    return u;
  }
  function hasChoropleth(gd) {
    return (gd.data || []).some(function (t) { return t.type === "choroplethmap"; });
  }
  // Apply a flat dotted-key update (buildUpdate's shape) onto a nested layout, in place — so the
  // same update can feed Plotly.newPlot (which wants nested layout) instead of relayout.
  function setPath(obj, path, val) {
    var parts = path.split("."), o = obj;
    for (var i = 0; i < parts.length - 1; i++) {
      if (o[parts[i]] == null || typeof o[parts[i]] !== "object") o[parts[i]] = {};
      o = o[parts[i]];
    }
    o[parts[parts.length - 1]] = val;
  }
  function apply(dark) {
    document.body.classList.toggle("qsv-dark", dark);
    var p = dark ? DARK : LIGHT;
    document.querySelectorAll(".js-plotly-plot").forEach(function (gd) {
      var u = buildUpdate(gd, p);
      try {
        if (hasChoropleth(gd)) {
          // A choroplethmap (MapLibre) throws "setData of undefined" on a relayout/react in our
          // pinned plotly fork, so fold the theme update (incl. the basemap `.style`) into a full
          // Plotly.newPlot — the only primitive that safely restyles a choroplethmap without
          // blanking its polygons. Preserve the injected fullscreen modebar button via the div's
          // existing config.
          Object.keys(u).forEach(function (k) { setPath(gd.layout, k, u[k]); });
          var cfg = { responsive: true };
          var add = gd._context && gd._context.modeBarButtonsToAdd;
          if (add && add.length) cfg.modeBarButtonsToAdd = add;
          Plotly.newPlot(gd, gd.data, gd.layout, cfg);
        } else {
          Plotly.relayout(gd, u);
        }
      } catch (e) {}
    });
  }
  function init() {
    var dark = isDark();
    apply(dark);
    var btn = document.getElementById("qsv-theme-toggle");
    if (btn) btn.addEventListener("click", function () {
      var nowDark = !document.body.classList.contains("qsv-dark");
      try { localStorage.setItem("qsv-viz-theme", nowDark ? "dark" : "light"); } catch (e) {}
      apply(nowDark);
    });
  }
  if (document.readyState === "loading")
    document.addEventListener("DOMContentLoaded", function () { setTimeout(init, 0); });
  else setTimeout(init, 0);
})();
</script>
