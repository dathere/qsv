name = "qsv Default Prompt File"
description = "Default prompt file for qsv's describegpt command."
author = "qsv team"
version = "7.2.0"
tokens = 20000
base_url = "http://localhost:1234/v1"
model = "openai/gpt-oss-20b"
timeout = 300
format = "markdown"
# responses will be in this language/dialect, or model default if not set
# Can be set to "traditional" languages like Spanish, German,French, Hindi, Mandarin, etc.
# Or "dialects" like Taglish, Pig Latin, Valley Girl, Pirate, Shakespearean English, etc.
language = ""

### NOTE: The following VARIABLES are available in Mini Jinja templates (use {{ variable }} syntax):
# {{ stats }} - summary statistics in CSV format
# {{ frequency }} - frequency distribution in CSV format
# {{ dictionary }} - data dictionary in JSON format
# {{ json_add }} - if --json option is set, inserts (note leading space)
#    ` (in valid, pretty-printed JSON format, ensuring string values are properly escaped)`
#   otherwise inserts
#    ` (in Markdown format)`
# {{ input_table_name }} - the name of the input CSV file.
#    In DuckDB SQL mode, this is replaced with the read_csv_auto function call,
#     e.g. `read_csv_auto('input.csv')`.
#    In Polars SQL --prompt mode, this is replaced with the table alias, e.g. `_t_1`.
# {{ generated_by_signature }} - Attribution metadata and warning placeholder
# {{ duckdb_version }} - only up to the minor version - e.g "1.3"
# {{ top_n }} - The enum threshold for the frequency command
# {{ num_tags }} - The maximum number of tags to infer when the --tags option is used
# {{ tag_vocab }} - The tag vocabulary file content
# {{ language }} - The language to use for the response. Empty string if not set. Has leading space if set.
# {{ headers }} - CSV headers
# {{ delimiter }} - CSV delimiter character
# {{ sample_file }} - The temporary file containing a random sample of the input CSV file.
#                     Only present if --prompt is set.
# {{ sample_size }} - The number of rows in the random sample.
# {{ infer_content_type }} - true when --infer-content-type is set; gates the optional
#                     Content Type instruction in the dictionary_prompt below.
# {{ content_type_vocab }} - comma-separated list of allowed Content Type tokens
#                     (the curated qsv vocabulary)
# {{ first_pass_dictionary }} - JSON string of the first-pass Data Dictionary. Populated
#                     only while rendering the dictionary_refine_prompt during a --two-pass
#                     run; empty string otherwise. The refine prompt feeds this back to the
#                     LLM so it can refine Label, Description and Content Type using
#                     cross-field context (e.g. recognizing that street_no + street_name +
#                     city + state + zip describe a single mailing address).
# {{ context }} - Additional, user-supplied context about the dataset, provided via the
#                     --context-file option. Accepts text/Markdown/CSV, Excel/ODS spreadsheets
#                     (extracted to CSV), and PDF/image files (JPEG/PNG/WebP/GIF, sent to the
#                     LLM as a multimodal attachment - here the variable renders a short marker).
#                     Empty string when --context-file is not set, so guard usage with
#                     `{% if context %}`. By default qsv injects this into the USER message (not
#                     the system prompt); if a custom template references {{ context }} in any
#                     prompt, that explicit placement is honored instead.

system_prompt = """
You are an expert library scientist with extensive expertise in Statistics, Data Science and SQL.
You are also an expert on the DCAT-US 3 metadata specification (https://doi-do.github.io/dcat-us/).

When you are asked to generate a Data Dictionary, Description or Tags, use the provided Summary Statistics and
Frequency Distribution to guide your response. They both describe the same Dataset and are joined on the `field` column.

The provided Summary Statistics is a CSV file. Each record contains statistics for each Dataset field.

The provided Frequency Distribution is a CSV file with these columns - `field`, `value`, `count`, `percentage`, `rank`.
For each Dataset field, it lists the top {{ top_n }} most frequent unique values sorted in descending order,
with the special value "Other (N)" indicating "Other" unique values beyond the top {{ top_n }}.
The "N" in "Other (N)" indicates the count of "Other" unique values. The "Other" category has a special rank of 0.

The Frequency Distribution's `rank` column is 1-based and is calculated based on the count of the values, with the
most frequent having a rank of 1. In case of ties, `rank` is calculated based on the "dense" rank-strategy (AKA "1223" ranking).

For Dataset fields with all unique values (i.e. cardinality is equal to the number of records), the Frequency Distribution's
`value` column is the special value "<ALL_UNIQUE>"; `count` - the number of records; `percentage` - 100; and `rank` - 0.
"""

dictionary_prompt = """
Generate{% if language %} {{ language|trim|title }}{% endif %} Labels{% if infer_content_type %},{% else %} and{% endif %} Descriptions{% if infer_content_type %} and Content Types{% endif %} for ALL fields in the Dataset. Use the Summary Statistics and Frequency Distribution to understand the context and meaning of each field.

{% set headers_list = headers|split(",")|list %}
The Dataset has {{ headers_list|length }} field{{ headers_list|length | pluralize }}:
{%- for header in headers_list %}
  {{ loop.index }}. {{ header | trim }}
{%- endfor %}

For each field, provide:
- Label: a human-friendly label for this field (e.g., "Unique Key", "Created Date", "Agency Name")
- Description: a full description for this field (can be multiple sentences)
{%- if infer_content_type %}
- Content Type: classify the SEMANTIC CONTENT of this field by choosing exactly ONE token from the
  fixed vocabulary below. Do NOT invent tokens and do NOT return free text - with the explicit
  suffix exceptions documented below for "date", "datetime" and "duration". Base your choice on
  the field name, the Label and Description you just produced for this field, the Summary
  Statistics and the Frequency Distribution - the Label and Description capture your own semantic
  reading of the field and must be consistent with the Content Type token you pick (e.g. a Label
  of "Email Address" or a Description mentioning "email" should map to "email", not "free_text").
  For plain numeric or boolean fields with no specific semantic meaning, use "unknown" - those are
  already covered by the deterministic Type column. Use "time" for fields that contain only a
  time-of-day (e.g. "HH:MM:SS", "14:30") and "duration" for fields that contain elapsed-time
  values (e.g. "PT5M30S", "00:05:30") - these are NOT covered by the deterministic Type column.
  DATE & DATETIME: for any field whose Type in the Summary Statistics is "Date" or "DateTime",
  set Content Type to "date" or "datetime" respectively, suffixed with ":<fmt>" where <fmt> is
  the chrono strftime format that matches the RAW values shown for that field in the Frequency
  Distribution (NOT the normalized min/max in the Summary Statistics). Use chrono strftime
  syntax - see https://docs.rs/chrono/latest/chrono/format/strftime/ - e.g.
  "datetime:%m/%d/%Y %I:%M:%S %p" for "01/24/2013 12:00:00 AM", "date:%Y-%m-%d" for "2013-01-24",
  "date:%d-%b-%Y" for "24-Jan-2013". The "date"/"datetime" token itself is re-derived
  deterministically by qsv from the Type column - your only job is the ":<fmt>" suffix. If you
  cannot confidently infer a format, emit the bare "date" or "datetime" with no suffix. Use
  "date"/"datetime" ONLY for Date/DateTime-typed columns; "time" remains for time-of-day-only
  string columns.
  ALLOWED EXTENSION (the explicit exceptions to "do not invent tokens"): the "duration" token
  MAY optionally be suffixed with ":N" where N is a positive integer upper bound in
  SECONDS, e.g. "duration:18000" for race times (~5 hours), "duration:7200" for video lengths
  (~2 hours), "duration:300" for HTTP request latencies (~5 minutes). Pick a cap that comfortably
  contains the values you see in min/max and the Frequency Distribution; do NOT over-tighten. If
  you cannot confidently pick a cap, just use bare "duration" (synthesize will default to a
  24-hour range). The "date"/"datetime" ":<fmt>" suffix described above is the other allowed
  exception. These suffixes are part of the allowed vocabulary, not free-form inventions. No
  other token accepts a suffix. If no token fits, use "unknown".
  NOTE: "unique_id" is RESERVED and set deterministically by qsv when a field's cardinality
  equals the row count (primary keys, surrogate keys, sequence numbers). DO NOT use
  "unique_id" yourself - it will be ignored if you do. For such fields, pick the most
  specific other token that fits (e.g. "uuid", "isbn"); the deterministic override replaces
  it only when the row-count check matches.
  Allowed Content Type tokens: {{ content_type_vocab }} (plus the optional "duration:N" and
  "date:<fmt>" / "datetime:<fmt>" suffix forms described above)
- Role: classify how this field is USED in analysis by choosing exactly ONE token from:
  {{ role_vocab }}. Use "identifier" for keys/codes that name an entity, "timestamp" for
  date/time fields, "measure" for numeric quantities you would aggregate (sum/avg/min/max), and
  "dimension" for categorical attributes you would GROUP BY or filter on. If you assigned a
  temporal Content Type (date/datetime/time), role MUST be "timestamp", never "measure". NOTE:
  "identifier" (for unique-key columns) and "timestamp" (for Date/DateTime columns) are re-derived
  deterministically by qsv; your value is used for every other field.
- Concept: give this field a CATALOG-WIDE semantic identity by choosing exactly ONE token from the
  fixed concept vocabulary below. Two columns in DIFFERENT datasets that share the same concept
  denote the same real-world thing and are join-compatible - this is what lets an agent correlate
  and join datasets across a catalog. Pick the most specific concept that fits; use "unknown" if
  none do. Do NOT invent tokens. NOTE: "id.surrogate_key" is RESERVED and set deterministically by
  qsv for unique-key columns - do not use it yourself.
  Allowed Concept tokens: {{ concept_vocab }}
- Gauge Range (OPTIONAL, CONTINUOUS numeric MEASURE fields only): if - and ONLY if - this field is
  a CONTINUOUS numeric "measure" (a quantity that varies smoothly across many values, charted as a
  distribution) that rides a well-known CANONICAL scale with a fixed, meaningful full-scale maximum,
  add a "gauge_range" as a two-number array [min, max] giving that scale's bounds. Use it for a
  percentage (`[0, 100]`), a probability or ratio (`[0, 1]`), or a bounded continuous index/score.
  The range MUST contain the field's observed Min and Max (from the Summary Statistics) - a
  dashboard draws the value against this scale, so a range the data spills past is worse than none.
  Do NOT add a gauge_range to:
    - an OPEN-ENDED measure whose maximum is just "however big the data happens to get" - revenue,
      counts, amounts, durations, distances, weights; or
    - a DISCRETE / low-cardinality rating with only a handful of distinct levels (a 1-to-5 star
      rating, a 0-to-10 score with few values) - the dashboard treats those as categories, not
      continuous measures, so a gauge would never render for them.
  OMIT "gauge_range" entirely in those cases. When in doubt, omit it: qsv drops any range that does
  not contain the observed data, and a missing gauge_range simply renders as a plain number instead
  of a dial. Never emit a "target", baseline, or goal value - you cannot know a business goal from
  the data.
{%- endif %}

{%- if infer_content_type %}
After the per-field analysis, identify INTER-COLUMN RELATIONSHIPS - groups of fields
that are NOT independent of each other. Consider ALL fields together as a whole dataset.
Emit a top-level "relationships" array; each element is an object with:
  - "kind": exactly one of
      "joint"      - fields whose values only occur in fixed real-world combinations,
                     so a value in one constrains the others (e.g. city + state + zip,
                     or category + subcategory).
      "ordered"    - numeric or date/datetime fields that must keep a monotonic order
                     within every row (e.g. created_date <= closed_date, or
                     subtotal <= total). List "members" from lowest to highest.
      "correlated" - numeric fields that move together, positively or negatively
                     (e.g. height and weight, quantity and total_price).
  - "members": an array of 2 or more field names in the group, spelled exactly as the
               field names above. For "ordered", list them in ascending order.
  - "anchor": ("ordered" only) the field the others are measured from - normally the
              first/earliest member.
Only emit relationships you are confident about from the field names, the Labels and
Descriptions you produced, and the Summary Statistics. Do NOT place a field in more
than one relationship. If you find none, emit an empty array.

Also provide a top-level "grain" string: a single sentence stating what ONE ROW represents,
e.g. "one row = one 311 service request" or "one row = one daily reading per station".
{%- endif %}
{%- if infer_null_values %}

For "null_values", list the literal values a field uses to stand in for MISSING data instead of
being real data. Two kinds, and you should look for BOTH:

  1. Text placeholders. These are visible in the Frequency Distribution as repeated,
     out-of-pattern strings: NULL, N/A, n/a, NA, -, --, ?, ., unknown, missing, TBD, none.
  2. Out-of-range numeric and date placeholders: -999, -9999, 9999, 0, 9999-12-31, 0000-00-00,
     1900-01-01. These parse as perfectly ordinary numbers and dates, so they will NOT look
     unusual in the Frequency Distribution. Judge them from the field's MEANING together with
     its Min/Max: a "-999" floor on a depth or temperature column is a placeholder; the same
     value in an "account_balance" column may be real.

Rules:
  * Emit each value EXACTLY as it appears in the data - do not change case, strip leading
    zeros, or reformat dates.
  * Be conservative. A value that genuinely belongs to the field's domain is NOT a sentinel.
    A legitimately deep water level of -140 in a well-depth column is a real measurement.
  * Do NOT list the empty string; qsv already counts empty cells as nulls.
  * Do NOT list the null placeholder that the Frequency Distribution itself displays for
    already-empty cells (it appears as "(NULL)", or whatever --null-text is set to). That
    is qsv's own label for cells it has already counted as missing, not a value present
    in the data.
  * If a field has no null sentinels, emit an empty array.

qsv independently checks every value you list against the actual data. Values it can confirm are
recorded as confirmed sentinels; values it cannot confirm - which includes ALL numeric and date
placeholders, because they are indistinguishable from real values by any scan - are recorded
separately as candidates flagged for human confirmation. Nothing is ever applied to the data
automatically, so propose a numeric placeholder whenever the field's meaning genuinely supports
one. Do not invent one to be thorough.
{%- endif %}

Return the results in JSON format where each field name is a key, and the value is an object with "label"{% if infer_content_type %},{% else %} and{% endif %} "description"{% if infer_content_type %}, "content_type", "role", "concept" and (for canonical-scale numeric measures only) an optional "gauge_range"{% endif %}{% if infer_null_values %} and "null_values"{% endif %} properties{% if infer_content_type %}, plus a top-level "grain" string and an optional "relationships" array{% endif %}:
{% raw %}{
  "field_name_1": {
    "label": "Human-friendly label",
    "description": "Full description of the field"{% endraw %}{% if infer_content_type %},
    "content_type": "datetime:%m/%d/%Y",
    "role": "timestamp",
    "concept": "time.event_timestamp"{% endif %}{% if infer_null_values %},
    "null_values": ["9999-12-31"]{% endif %}{% raw %}
  },
  "field_name_2": {
    "label": "Another label",
    "description": "Another description"{% endraw %}{% if infer_content_type %},
    "content_type": "city",
    "role": "dimension",
    "concept": "geo.city"{% endif %}{% if infer_null_values %},
    "null_values": ["N/A", "UNKNOWN"]{% endif %}{% raw %}
  }{% endraw %}{% if infer_content_type %},
  "grain": "one row = one record",
  "relationships": [
{% raw %}    {"kind": "ordered", "members": ["created_date", "closed_date"], "anchor": "created_date"},
    {"kind": "joint", "members": ["city", "state", "zip"]}{% endraw %}
  ]{% endif %}{% raw %}
}{% endraw %}

Let's think step by step, correcting yourself as needed.

---

Summary Statistics (CSV):

{{ stats }}

Frequency Distribution (CSV):

{{ frequency }}
"""

# Refine-pass prompt template used by `--two-pass`. The LLM sees the FIRST-PASS Data
# Dictionary as JSON in `{{ first_pass_dictionary }}` and is asked to re-emit Label,
# Description and (when --infer-content-type is set) Content Type for EVERY field with
# cross-field awareness. The output JSON shape MUST match `dictionary_prompt`'s output
# shape — qsv parses both with the same `parse_llm_dictionary_response` code path.
#
# IMPORTANT: this template is also baked into `DEFAULT_DICTIONARY_REFINE_PROMPT` in
# `src/cmd/describegpt.rs` as a `#[serde(default)]` fallback for users whose
# `--prompt-file` TOMLs pre-date `--two-pass`. The test
# `tests::default_dictionary_refine_prompt_matches_resource` keeps them in sync — if you
# edit this block, update the constant too (or the test will fail with a diff).
dictionary_refine_prompt = """
Refine the previously-generated Data Dictionary using full cross-field context.

You are given the FIRST-PASS DATA DICTIONARY below, which already contains a Label{% if infer_content_type %}, Description and Content Type{% else %} and Description{% endif %} for every field. The first pass produced these field-by-field without seeing the dictionary as a coherent whole, so it may have missed obvious cross-field relationships.

Look at all fields together and identify groups that semantically belong to a single higher-level concept, for example:
- street number + street name + unit + city + state/region + postal code = a single MAILING ADDRESS
- first name + middle initial/name + last name + suffix = a single PERSON NAME
- latitude + longitude (and optionally altitude) = a GEOGRAPHIC COORDINATE
- start date + end date (or begin/end timestamps) = a DATE RANGE / DURATION
- date column + time column = a single TIMESTAMP split across two columns
- price/cost + currency code = a MONEY value
- quantity + unit-of-measure = a MEASUREMENT

Then re-emit Label{% if infer_content_type %}, Description and Content Type{% else %} and Description{% endif %} for EVERY field, not just the ones you change. For fields that belong to a composite concept, mention the relationship in the Description (e.g. "Street name component of the mailing address; combine with street_no, city, state and zip to form the full address.") and refine the Label to make the role explicit.

{% set headers_list = headers|split(",")|list %}
The Dataset has {{ headers_list|length }} field{{ headers_list|length | pluralize }}:
{%- for header in headers_list %}
  {{ loop.index }}. {{ header | trim }}
{%- endfor %}

FIRST-PASS DATA DICTIONARY (JSON):
{{ first_pass_dictionary }}

{% if infer_content_type %}For Content Type, the same rules from the first pass apply:
- Choose exactly ONE token from the fixed vocabulary (lowercased; the ":<fmt>" suffix on
  date/datetime tokens is case-sensitive chrono strftime syntax).
- The `duration:N` suffix form is allowed (seconds upper bound).
- "date"/"datetime" tokens carry a chrono strftime ":<fmt>" suffix matching the column's raw
  values (e.g. "datetime:%m/%d/%Y %I:%M:%S %p"). The token itself is re-derived deterministically
  by qsv from the Type column; you may correct or add the ":<fmt>" suffix using cross-field
  context, but must NOT reclassify a Date/DateTime column to a non-date token.
- "unique_id" is RESERVED and set deterministically by qsv based on cardinality; for any field
  whose first-pass Content Type is "unique_id", OMIT the `content_type` key entirely from your
  output for that field — qsv will re-apply the deterministic value. Do not echo "unique_id"
  yourself; it will be stripped.
- Use cross-field context to pick a BETTER token when warranted. For example, a column named
  "street1" originally classified as "free_text" should become "address_street" once you see
  the sibling city / state / zip columns.
- If you genuinely cannot improve a field's Content Type, keep the first-pass value verbatim.
Allowed Content Type tokens: {{ content_type_vocab }} (plus the optional "duration:N" and
"date:<fmt>" / "datetime:<fmt>" suffix forms).

{% endif %}Return the results in the SAME JSON shape as the first pass:
{% raw %}{
  "field_name_1": {
    "label": "Refined human-friendly label",
    "description": "Refined full description, referencing cross-field relationships when applicable"{% endraw %}{% if infer_content_type %},
    "content_type": "address_street"{% endif %}{% raw %}
  },
  "field_name_2": {
    "label": "...",
    "description": "..."{% endraw %}{% if infer_content_type %},
    "content_type": "..."{% endif %}{% raw %}
  }
}{% endraw %}

Let's think step by step, correcting yourself as needed.
"""

