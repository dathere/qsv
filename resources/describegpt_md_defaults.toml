name = "qsv Default Markdown Template File"
description = "Default Mini Jinja templates for describegpt's Markdown output."
author = "qsv team"
version = "1.0.0"

### NOTE: The following VARIABLES are available in Mini Jinja templates (use {{ variable }} syntax):
# Wrapper templates (dictionary_md_template / description_md_template / tags_md_template /
# custom_prompt_md_template) receive:
#   {{ llm_response }}      - the unescaped LLM response (post SQL-rewrite for Prompt mode,
#                             with {GENERATED_BY_SIGNATURE} placeholder already substituted;
#                             for the Dictionary kind this is the rendered body template below)
#   {{ kind }}              - "Dictionary" | "Description" | "Tags" | "Prompt"
#   {{ reasoning }}         - LLM reasoning trace (may be empty)
#   {{ token_usage }}       - Debug-formatted token usage string (matches legacy output)
#   {{ token_usage_struct }} - structured access: .prompt, .completion, .total, .elapsed
#   {{ generated_by_signature }} - rendered attribution block (Markdown format)
#   {{ model }}, {{ base_url }}, {{ input_filename }}, {{ timestamp }}
#
# The dictionary body template (dictionary_md_body_template) additionally receives:
#   {{ entries }}           - list of records, each with: name, type, label, description,
#                             content_type, min, max, cardinality, enumeration, null_count,
#                             addl_cols, examples
#                             (content_type is empty unless {{ infer_content_type }} is true)
#   {{ addl_col_names }}    - list of additional column names (in display order)
#   {{ infer_content_type }} - true when --infer-content-type is set; gates the optional
#                             "Content Type" column in the default body template
#
### Custom Mini Jinja filters available in all describegpt markdown templates:
#   pipe_escape       - replaces "|" with "\|" (escapes pipe for markdown tables)
#   br_replace        - replaces newlines with "<br>"
#   human_count       - thousands-separator formatting (1234 -> "1,234")
#   dict_cell(col)    - addl-cols cell formatting; for the special "percentiles" column
#                       both pipes and newlines become "<br>", otherwise pipes are escaped
#                       and newlines become "<br>"
#   humanize_examples(content_type) - reproduces legacy "value [count]" line humanization, joined
#                       with "<br>"; the special sentinel "<ALL_UNIQUE>" is passed through unchanged.
#                       The optional content_type arg, when it carries an inferred date format
#                       (e.g. "date:%m/%d/%Y"), reformats each example value to that format so the
#                       Examples column matches the date-formatted Min/Max. Omit it to skip date
#                       reformatting.

dictionary_md_body_template = """| Name | Type | Label | Description |{% if infer_content_type %} Content Type |{% endif %} Min | Max | Cardinality | Enumeration | Null Count{% for col in addl_col_names %} | {{ col }}{% endfor %} | Examples |
|------|------|-------|-------------{% if infer_content_type %}|--------------{% endif %}|-----|-----|-------------|-------------|------------{% for col in addl_col_names %}|----------{% endfor %}|----------|
{% for entry in entries -%}
{% set df = entry.content_type | regex_replace("^(date|datetime):", "") if entry.content_type | regex_match("^(date|datetime):") else "" -%}
| **{{ entry.name | pipe_escape }}** | {{ entry.type | pipe_escape }} | {{ entry.label | pipe_escape }} | {{ entry.description | pipe_escape | br_replace }} |{% if infer_content_type %} {{ entry.content_type | pipe_escape }} |{% endif %} {% if df and entry.min %}{{ entry.min | datefmt(df) | pipe_escape }}{% else %}{{ entry.min | pipe_escape }}{% endif %} | {% if df and entry.max %}{{ entry.max | datefmt(df) | pipe_escape }}{% else %}{{ entry.max | pipe_escape }}{% endif %} | {{ entry.cardinality | human_count }} | {{ entry.enumeration | pipe_escape | br_replace }} | {{ entry.null_count | human_count }}{% for col in addl_col_names %} | {{ entry.addl_cols[col] | default("") | dict_cell(col) }}{% endfor %} | {{ entry.examples | pipe_escape | humanize_examples(entry.content_type) }} |
{% endfor %}
*Attribution: {{ generated_by_signature }}*
"""

# NOTE: by default the four wrapper templates below are byte-identical — they only differ on
# the `{{ kind }}` substitution at runtime. The `default_wrapper_templates_are_byte_identical`
# test asserts this; if you intentionally specialize one wrapper, update that test too.

dictionary_md_template = """# {{ kind }}
{{ llm_response }}
## REASONING

{{ reasoning }}
## TOKEN USAGE

{{ token_usage }}
---
"""

description_md_template = """# {{ kind }}
{{ llm_response }}
## REASONING

{{ reasoning }}
## TOKEN USAGE

{{ token_usage }}
---
"""

tags_md_template = """# {{ kind }}
{{ llm_response }}
## REASONING

{{ reasoning }}
## TOKEN USAGE

{{ token_usage }}
---
"""

custom_prompt_md_template = """# {{ kind }}
{{ llm_response }}
## REASONING

{{ reasoning }}
## TOKEN USAGE

{{ token_usage }}
---
"""

### The semanticmd body template (semanticmd_md_body_template) emits a semantic-md data
# dictionary document (https://semanticmd.org/). It is rendered during the Dictionary phase;
# the `{DATASET_DESCRIPTION}` and `{SEMANTICMD_TAGS}` placeholders are substituted afterwards
# in finalize_structured_output with the --description response and --tags frontmatter block.
# Besides the wrapper variables, it receives:
#   {{ profile }}        - the semantic-md schema/profile reference (frontmatter `semantic-md:` value)
#   {{ dataset_id }}     - dataset identifier (input filename stem)
#   {{ dataset_title }}  - human-friendly dataset title
#   {{ schema_id }}      - schema/table slug (lowercased, alphanumerics only)
#   {{ resource_name }}  - the input filename (or "input" for stdin)
#   {{ primary_key }}    - inferred single-column primary key, or empty when omitted
#   {{ entries }}        - list of records, each with: name, sem_type, required, label, description,
#                          is_numeric, min, max, cardinality, null_count, choices (list),
#                          frequency (list of {choice, count, percentage, rank}), has_frequency
semanticmd_md_body_template = """---
semantic-md: {{ profile }}
{SEMANTICMD_TAGS}---

# Dataset {{ dataset_id }}

{DATASET_DESCRIPTION}

| Resource | Schema | Title |
| --- | --- | --- |
| `{{ resource_name | pipe_escape }}` | `{{ schema_id }}` | {{ dataset_title | pipe_escape }} |

# Schema `{{ schema_id }}`

| Column | Type | Label |
| --- | --- | --- |
{% for entry in entries -%}
| `{{ entry.name | pipe_escape }}` | {% if entry.required %}required {% endif %}{{ entry.sem_type }} | {{ entry.label | pipe_escape }} |
{% endfor -%}
{% if primary_key %}
| Primary key |
| --- |
| `{{ primary_key | pipe_escape }}` |
{% endif %}
{%- for entry in entries %}
## Column `{{ entry.name }}`

{{ entry.description }}
{% if entry.is_numeric and entry.min %}
### Validation

Values >= {{ entry.min }}
{% endif -%}
{% if entry.choices %}
### Choices

{% for choice in entry.choices -%}
- {{ choice }}
{% endfor -%}
{% endif %}
{%- endfor %}
# Resource `{{ resource_name }}`

## Statistics

| Column | Min | Max | Cardinality | Null Count |
| --- | ---: | ---: | ---: | ---: |
{% for entry in entries -%}
| `{{ entry.name | pipe_escape }}` | {{ entry.min | pipe_escape }} | {{ entry.max | pipe_escape }} | {{ entry.cardinality }} | {{ entry.null_count }} |
{% endfor -%}
{% for entry in entries %}{% if entry.has_frequency %}
### Frequency for `{{ entry.name }}`

| Choice | Frequency | Percentage | Rank |
| :--- | ---: | ---: | ---: |
{% for row in entry.frequency -%}
| {{ row.choice | pipe_escape }} | {{ row.count }} | {{ row.percentage }} | {{ row.rank }} |
{% endfor -%}
{% endif %}{% endfor %}
*Attribution: {{ generated_by_signature }}*
"""
