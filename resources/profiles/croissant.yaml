# Croissant 1.1 ML metadata profile (https://github.com/mlcommons/croissant)
#
# Emits a schema.org-rooted JSON-LD document conforming to Croissant
# 1.1. The @context inlines the full canonical 1.1 prefix table plus
# the cr: shortcut terms (`recordSet`, `field`, `fileObject`, `source`,
# `extract`, `column`, `dataType`, ...), so emitted JSON uses bare
# property names exactly as the spec's canonical examples do.
#
# 1.1 deltas vs 1.0 in this profile:
#   * conformsTo bumped from .../croissant/1.0 → .../croissant/1.1
#   * @context expanded to the canonical 1.1 shape (adds `sc:`,
#     `rai:`, and the cr: shortcut term table)
#   * Distribution @type switched from `sc:FileObject` to `cr:FileObject`
#     (canonical 1.1 — Croissant defines its own FileObject class)
#   * FileObject and RecordSet now carry `@id` slugs (required for
#     JSON-LD identity / cross-references between Field.source and the
#     FileObject it sources from)
#   * Hash field switched from the non-canonical
#     `cr:fileFingerprint`+`cr:Checksum` nested shape to the canonical
#     direct `sha256` property mlcroissant validates against. BLAKE3
#     remains the faster option but is not in the Croissant vocabulary;
#     spec-compliance wins here.
#   * cr:Field entries now carry the canonical
#     `source.{fileObject:{@id}, extract:{column}}` block, wiring each
#     field back to its origin column in the FileObject.
#   * Optional 1.1 field `citeAs` surfaces when `pkg.citation` is
#     present in the seed metadata.
#
# Validation: disabled (no published JSON Schema upstream; Croissant
# uses Python validator https://github.com/mlcommons/croissant/tree/main/python/mlcroissant).
# Discovery: disabled (Croissant isn't typically discovered from
# CKAN-shaped publisher metadata).

name: croissant
version: 1.1.0
about: Croissant 1.1 ML metadata format (mlcommons.org)
about_url: https://github.com/mlcommons/croissant

# =========================================================================
# Named vocabularies
# =========================================================================

vocabularies:
  # Same license_iri table — Croissant doesn't define its own license
  # vocabulary; users supply IRIs / SPDX identifiers / free text.
  license_iri:
    cc-by:     "http://creativecommons.org/licenses/by/4.0/"          # DevSkim: ignore DS137138
    cc-by-sa:  "http://creativecommons.org/licenses/by-sa/4.0/"       # DevSkim: ignore DS137138
    cc-zero:   "http://creativecommons.org/publicdomain/zero/1.0/"    # DevSkim: ignore DS137138
    odc-by:    "http://opendatacommons.org/licenses/by/1.0/"          # DevSkim: ignore DS137138
    odc-pddl:  "http://opendatacommons.org/licenses/pddl/1.0/"        # DevSkim: ignore DS137138

  # qsv stats type → Croissant/schema.org datatype IRI. Atomic types
  # only; ML-specific (cr:BoundingBox, cr:Split, cr:Label) require
  # explicit user opt-in via formula output. NB: the recordSet template
  # inlines this mapping directly (see `recordsets:` below) so the
  # vocabulary entry here is informational; future helpers may consult it.
  croissant_datatype:
    String:      "sc:Text"
    Integer:     "sc:Integer"
    Float:       "sc:Float"
    Boolean:     "sc:Boolean"
    Date:        "sc:Date"
    DateTime:    "sc:DateTime"
    URL:         "sc:URL"
    NULL:        "sc:Text"

# =========================================================================
# CKAN → Croissant pointer mappings
# =========================================================================
# Croissant top-level keys are schema.org bare names (no namespace
# prefix); `@vocab` in the @context resolves them to schema.org IRIs.

field_mappings:
  - { ckan: "/package/title",                target: "/projection/name" }
  - { ckan: "/package/notes",                target: "/projection/description" }
  - { ckan: "/package/name",                 target: "/projection/identifier" }
  - { ckan: "/package/metadata_created",     target: "/projection/datePublished" }
  - { ckan: "/package/metadata_modified",    target: "/projection/dateModified" }
  - { ckan: "/package/publisher",            target: "/projection/publisher" }
  - { ckan: "/package/author",               target: "/projection/creator" }
  - { ckan: "/package/tags",                 target: "/projection/keywords" }
  - { ckan: "/package/language",             target: "/projection/inLanguage" }
  - { ckan: "/package/landing_page",         target: "/projection/url" }
  - { ckan: "/package/url",                  target: "/projection/url" }
  - { ckan: "/package/version",              target: "/projection/version" }
  - { ckan: "/package/citation",             target: "/projection/citeAs" }
  - { ckan: "/resource/url",                 target: "/projection/distribution/0/contentUrl" }
  - { ckan: "/resource/format",              target: "/projection/distribution/0/encodingFormat" }
  - { ckan: "/resource/license_id",          target: "/projection/license" }
  - { ckan: "/resource/license",             target: "/projection/license" }

# =========================================================================
# Schema validation: disabled
# =========================================================================
# Croissant uses a Python validator (mlcroissant); JSON Schema isn't
# upstream. `enabled: false` keeps the built-in JSON-Schema validator
# off; the `external` block wires up the canonical Python validator
# when it's installed locally (graceful skip with an Info-severity
# warning when it isn't).
validation:
  enabled: false
  strippable_curie_prefixes: []
  # `mlcroissant` is the reference validator shipped by MLCommons
  # (https://github.com/mlcommons/croissant/tree/main/python/mlcroissant).
  # Install via `pip install mlcroissant`. qsv runs it under
  # `--validate`; findings surface as ProjectionWarnings at
  # `default_severity`. Missing-binary cases never fail the run.
  external:
    command: "mlcroissant"
    args: ["validate", "--jsonld", "{file}"]
    label: "mlcroissant"
    default_severity: "recommended"
    # Shown in the missing-binary warning so users see the install
    # path at the exact moment they need it. Free-form — typically
    # a one-line install command + the project URL.
    install_hint: "pip install mlcroissant (https://github.com/mlcommons/croissant/tree/main/python/mlcroissant)"

# =========================================================================
# Dataset projection
# =========================================================================
# Croissant's @context is an inline map, not a single URI. Field
# paths use schema.org bare keys since @vocab resolves them. The
# context below mirrors the canonical 1.1 example
# (https://github.com/mlcommons/croissant/blob/main/docs/croissant-spec-1.1.md)
# so mlcroissant's JSON-LD expansion lands on the same IRIs the spec
# expects.

dataset:
  type: "sc:Dataset"
  context:
    "@language":        "en"
    "@vocab":           "https://schema.org/"
    sc:                 "https://schema.org/"
    cr:                 "http://mlcommons.org/croissant/"        # DevSkim: ignore DS137138
    rai:                "http://mlcommons.org/croissant/RAI/"    # DevSkim: ignore DS137138
    dct:                "http://purl.org/dc/terms/"              # DevSkim: ignore DS137138
    citeAs:             "cr:citeAs"
    column:             "cr:column"
    conformsTo:         "dct:conformsTo"
    data:               { "@id": "cr:data",        "@type": "@json" }
    dataType:           { "@id": "cr:dataType",    "@type": "@vocab" }
    equivalentProperty: "cr:equivalentProperty"
    examples:           { "@id": "cr:examples",    "@type": "@json" }
    extract:            "cr:extract"
    field:              "cr:field"
    fileObject:         "cr:fileObject"
    fileProperty:       "cr:fileProperty"
    fileSet:            "cr:fileSet"
    format:             "cr:format"
    includes:           "cr:includes"
    isLiveDataset:      "cr:isLiveDataset"
    jsonPath:           "cr:jsonPath"
    key:                "cr:key"
    md5:                "cr:md5"
    parentField:        "cr:parentField"
    path:               "cr:path"
    recordSet:          "cr:recordSet"
    references:         "cr:references"
    regex:              "cr:regex"
    repeated:           "cr:repeated"
    replace:            "cr:replace"
    samplingRate:       "cr:samplingRate"
    separator:          "cr:separator"
    source:             "cr:source"
    subField:           "cr:subField"
    transform:          "cr:transform"
  fields:
    - path: "name"
      template: '{{ pkg.title | default(source_label | basename | file_stem) | default("dataset") }}'
      required_level: required

    - path: "description"
      template: '{{ pkg.notes | default("") }}'
      required_level: required

    - path: "identifier"
      template: '{{ pkg.name | default("") }}'
      emit_when: '{{ (pkg.name | default("")) != "" }}'

    - path: "conformsTo"
      template: 'http://mlcommons.org/croissant/1.1'

    - path: "license"
      template: |
        {%- set raw = (pkg.license_id | default(pkg.license | default(res.license_id | default(res.license | default(""))))) -%}
        {%- if raw != "" -%}{{ lookup("license_iri", raw) | default(raw) }}{%- endif -%}
      emit_when: '{{ (pkg.license_id | default(pkg.license | default(res.license_id | default(res.license | default(""))))) != "" }}'

    - path: "url"
      template: '{{ (pkg.landing_page | default(pkg.url | default(""))) | only_if_absolute_iri }}'
      emit_when: '{{ (pkg.landing_page | default(pkg.url | default(""))) != "" }}'

    - path: "creator"
      template: |
        {%- set name = pkg.author | default(pkg.publisher | default("")) -%}
        {%- if name != "" -%}{ "@type": "Organization", "name": {{ name | tojson }} }{%- endif -%}
      emit_when: '{{ (pkg.author | default(pkg.publisher | default(""))) != "" }}'

    - path: "publisher"
      template: |
        {%- set name = pkg.publisher | default(pkg.author | default("")) -%}
        {%- if name != "" -%}{ "@type": "Organization", "name": {{ name | tojson }} }{%- endif -%}
      emit_when: '{{ (pkg.publisher | default(pkg.author | default(""))) != "" }}'

    - path: "datePublished"
      template: '{{ pkg.metadata_created | default("") }}'
      emit_when: '{{ (pkg.metadata_created | default("")) != "" }}'

    - path: "dateModified"
      template: '{{ pkg.metadata_modified | default("") | sanitize_iso_8601_interval }}'
      emit_when: '{{ (pkg.metadata_modified | default("")) != "" }}'

    - path: "keywords"
      template: |
        {%- if pkg.tags -%}
        [{% for t in pkg.tags %}{% if not loop.first %},{% endif %}
        {%- if t is string %}{{ t | tojson }}{% else %}{{ (t.name | default(t)) | tojson }}{% endif -%}
        {% endfor %}]
        {%- endif -%}
      emit_when: '{{ pkg.tags is defined and pkg.tags | length > 0 }}'

    - path: "inLanguage"
      template: '{{ lookup("iso_639_1", pkg.language | default("")) | default(pkg.language | default("")) }}'
      emit_when: '{{ (pkg.language | default("")) != "" }}'

    - path: "version"
      template: '{{ pkg.version | default("") }}'
      emit_when: '{{ (pkg.version | default("")) != "" }}'

    # 1.1: `citeAs` is a first-class cr: term defined in the @context;
    # populate it from the CKAN `citation` slot when the publisher
    # supplied one. Free-form text per the spec (BibTeX, APA, plain
    # prose — Croissant doesn't constrain the format).
    - path: "citeAs"
      template: '{{ pkg.citation | default("") }}'
      emit_when: '{{ (pkg.citation | default("")) != "" }}'

# =========================================================================
# Distribution projection — Croissant FileObject shape
# =========================================================================
# Croissant 1.1 distributions use `cr:FileObject` (or `cr:FileSet` for
# multi-file datasets). We emit one FileObject per CKAN resource and
# stamp a stable `@id` slug ("data.csv") so the recordSet's per-Field
# `source.fileObject.@id` can reference it.
#
# Hash: the canonical 1.1 example uses a direct `sha256` property on
# FileObject (mirrored as `md5` when SHA-256 isn't available). We emit
# `sha256` since it's the algorithm mlcroissant treats as canonical.
# BLAKE3 is faster on multi-GB ML training data but is NOT in the
# Croissant vocabulary; for 1.1 conformance we trade speed for
# validator-friendliness.

distribution:
  type: "cr:FileObject"
  # Croissant uses bare `distribution` (schema.org @vocab resolves it)
  # rather than the DCAT `dcat:distribution` shape.
  path: "distribution"
  fields:
    - path: "@id"
      template: 'data.csv'

    - path: "name"
      template: '{{ res.name | default(source_label | basename) | default("data.csv") }}'

    - path: "description"
      template: '{{ res.description | default("") }}'
      emit_when: '{{ (res.description | default("")) != "" }}'

    # 1.1: contentUrl is mandatory on FileObject. Prefer an absolute
    # `res.url` if one was supplied (URL inputs, --initial-context), else
    # fall back to the basename — the canonical 1.1 example uses a
    # relative path (`"contentUrl": "data/data.csv"`) so a bare basename
    # is spec-conformant and keeps mlcroissant's mandatory-property
    # check satisfied for local-file inputs.
    - path: "contentUrl"
      template: '{{ res.url | default(res.name | default(source_label | basename) | default("data.csv")) }}'

    - path: "qsv:sourcePath"
      template: '{{ source_label }}'

    - path: "encodingFormat"
      template: '{{ res.format | default("text/csv") }}'

    - path: "contentSize"
      template: '{{ file_size_of(local_path) }}'
      emit_when: '{{ file_size_of(local_path) is defined }}'

    # 1.1: SHA-256 lands as a direct property on FileObject (canonical).
    # The pre-1.1 `cr:fileFingerprint` + `cr:Checksum` nested shape has
    # been retired here — mlcroissant validates against this slot.
    - path: "sha256"
      template: '{{ sha256_of(local_path) }}'
      emit_when: '{{ sha256_of(local_path) is defined }}'

# =========================================================================
# RecordSets — one cr:Field per CSV column, wired to the FileObject
# =========================================================================
# Croissant 1.1 requires at least one cr:RecordSet per Dataset (1..*).
# Each cr:Field carries a `source` block that points back to a
# FileObject (`@id: data.csv`) and an extract directive (here, a
# column name) — that's how Croissant ties schema metadata to actual
# bytes. We render the field array inline (rather than via the
# build_croissant_fields helper) so we can include the canonical
# 1.1 `source` block; the helper emits a 1.0-style flat field list.
#
# qsv:* keys carry qsv-specific diagnostic info (cardinality, null
# count). They're outside the Croissant vocabulary; mlcroissant should
# tolerate them as opaque JSON-LD nodes.

recordsets:
  - path: "recordSet"
    for_each_column: false
    template: |
      [{
        "@type": "cr:RecordSet",
        "@id": "main-table",
        "name": "main-table",
        "description": "One record per CSV row.",
        "field": [
          {%- set ns = namespace(first=true) -%}
          {%- for col_name, col_blob in stats | items -%}
            {%- set st = col_blob.stats | default(col_blob) -%}
            {%- set qsv_type = st.type | default("String") -%}
            {%- set dt = ({
                "Integer":  "sc:Integer",
                "Float":    "sc:Float",
                "Boolean":  "sc:Boolean",
                "Date":     "sc:Date",
                "DateTime": "sc:DateTime",
                "URL":      "sc:URL",
              })[qsv_type] | default("sc:Text") -%}
            {%- if not ns.first %},{% endif -%}
            {%- set ns.first = false -%}
            {
              "@type": "cr:Field",
              "@id": {{ ("main-table/" ~ col_name) | tojson }},
              "name": {{ col_name | tojson }},
              "description": {{ ("Column `" ~ col_name ~ "` from the source CSV.") | tojson }},
              "dataType": {{ dt | tojson }},
              "source": {
                "fileObject": { "@id": "data.csv" },
                "extract": { "column": {{ col_name | tojson }} }
              },
              "qsv:cardinality": {{ st.cardinality | tojson }},
              "qsv:nullcount": {{ st.nullcount | tojson }}
            }
          {%- endfor %}
        ]
      }]

# =========================================================================
# Catalog: not applicable
# =========================================================================
# Croissant 1.1 has no Catalog envelope; --catalog with this profile
# falls back to a minimal sc:DataCatalog shell wrapping a single
# sc:Dataset. Provided primarily for federation parity.

catalog:
  type: "sc:DataCatalog"
  title_template: '{%- if inner.name -%}Catalog of {{ inner.name }}{%- else -%}Croissant DataCatalog{%- endif -%}'
  inherit_from_dataset:
    - "publisher"
  conforms_to: "http://mlcommons.org/croissant/1.1"        # DevSkim: ignore DS137138

# =========================================================================
# Discovery merge — disabled
# =========================================================================
# Croissant typically lives alongside ML training datasets, not in
# CKAN-style data portals, so publisher-DCAT-discovery isn't
# applicable.

discovery_merge:
  enabled: false
